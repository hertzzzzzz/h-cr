    <style>
        * { font-family: 'Montserrat', sans-serif !important; }
        html, body { background-color: #000 !important; margin: 0; padding: 0; }
        
        .dropdown-menu { display: none; transition: all 0.3s ease; }
        .dropdown-menu.show { display: block; }
        
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: scale(1.02); }
        .hltv-border { border: 1px solid #000; box-sizing: border-box; }
        
        .banner-container img { position: static !important; margin: 0 auto !important; display: block !important; }
        .banner-container, .banner-container a, .banner-container img { position: static !important; display: block !important; margin: 0 auto !important; }
        .banner-container { display: flex; justify-content: center; width: 100%; }

        .grow-text { transition: transform 0.2s ease-in-out; display: inline-block; }
        .grow-text:hover { transform: scale(1.08); }

        @keyframes listContentFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bannerFadeIn { from { opacity: 0; } to { opacity: 1; } }

        #news-list, #streams-list, #leaderboard-list { opacity: 0; }
        .animate-list-fade { animation: listContentFadeIn 0.5s ease-out forwards; }
        .animate-banner-left { opacity: 0; animation: bannerFadeIn 0.6s ease-in-out forwards; animation-delay: 150ms; }
        .animate-banner-right { opacity: 0; animation: bannerFadeIn 0.6s ease-in-out forwards; animation-delay: 300ms; }
    </style>

    <script>
        
        
        const NEWS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=30512158&single=true&output=csv';
        const STREAMS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=781157227&single=true&output=csv';
        const LEADERBOARD_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=299902186&single=true&output=csv';
        const LEVELS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=164268489&single=true&output=csv';

        let allLevels = [];
        let playerMap = {}; // Сюда будем сохранять связь: { "имя игрока": "id" }

        function toggleDropdown(element) { const card = element.closest('.stream-card'); if (card) { const menu = card.querySelector('.dropdown-menu'); if (menu) { menu.classList.toggle('show'); } } }

        async function initLevelsData() { 
    try { 
        const response = await fetch(LEVELS_URL); 
        const csvText = await response.text(); 
        const rows = csvText.split('\n').slice(1); 
        
        // Вспомогательная функция для корректного разделения строки CSV
        const parseCSVRow = (row) => {
            const result = [];
            let cur = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                let char = row[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(cur.trim());
                    cur = '';
                } else cur += char;
            }
            result.push(cur.trim());
            return result;
        };

        allLevels = rows.map((row, index) => { 
            if (!row.trim()) return null;
            const cols = parseCSVRow(row);
            console.log(`Строка ${index}: ID=${cols[9]}, Name=${cols[10]}`);
            
            // Теперь cols[15] (Прошедшие) — это полная строка "abboir, hertz, mama2"
            // А cols[16] (Описание) — это текст из Q
            const victors = cols[15]?.replace(/"/g, '') || ''; 
            const description = cols[16]?.replace(/"/g, '') || '';

            // Внутри функции initLevelsData, в объекте return
            // ... внутри initLevelsData
            return { 
                name: cols[2]?.trim(), 
                position: index + 1, 
                id: cols[12]?.trim(),
                author: cols[7]?.trim(),
                youtubeLink: cols[4]?.trim(),
                victors: victors,
                description: description,
                preview: cols[5]?.trim(), 
                authorCountry: cols[13]?.trim(),
                
                // Индексы из вашего лога:
                verifierId: cols[9]?.trim(), // ID верификатора
                verifier: cols[10]?.trim(),  // Имя верификатора
                
                verifierCountry: cols[14]?.trim()
            };
        }).filter(item => item !== null); 
        
        loadStreams(); 
    } catch (e) { console.error(e); } 
}

       async function renderLevelPage(levelId) {
    const container = document.getElementById('main-content');
    const level = allLevels.find(l => l.id === levelId);
    console.log("Данные уровня:", level);
    const verifierName = level.verifier.trim();
    const verifierId = playerMap[verifierName.toLowerCase()]; // Ищем ID по имени
    const verifierLink = level.verifierId ? `player.html?id=${level.verifierId.trim()}` : '#';
    
    
    if (!level) { 
        container.innerHTML = '<div class="text-red-500 font-bold">Уровень не найден</div>'; 
        return; 
    }

    // ... (код получения progressList и victorsList как был ранее)
    const response = await fetch(STREAMS_URL);
    const csvText = await response.text();
    const streamRows = csvText.split('\n').slice(1).map(r => r.split(','));
    const progressList = streamRows.filter(c => c[1]?.trim() === level.name && c[4]?.trim() !== '100');
    const victorsList = level.victors ? level.victors.replace(/"/g, '').split(',').map(n => n.trim()) : [];
    
    const getFlag = (code) => (!code || code.toUpperCase() === 'WORLD' || code.toUpperCase() === 'NA') ? 'images/flags/world.gif' : `images/flags/${code.toLowerCase()}.gif`;

    container.innerHTML = `
        <div class="animate-list-fade">
            <!-- Две колонки: Визуал слева, Инфо справа -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <!-- Левая сторона: Превью и кнопка -->
                <div class="flex flex-col gap-4">
                    <div class="border-2 border-gray-200">
                        <img src="${level.preview}" class="w-full h-auto" onerror="this.src='images/previews/default.png'">
                    </div>
                    ${level.youtubeLink ? `
                        <a href="${level.youtubeLink}" target="_blank" class="block w-full bg-black text-white py-3 font-bold uppercase text-center hover:bg-orange-600 transition-colors shadow-lg">
                            Смотреть видео
                        </a>
                    ` : ''}
                </div>

                <!-- Правая сторона: Название, Автор, Верификатор -->
                <div class="flex flex-col justify-center">
                    <h1 class="text-4xl font-black uppercase mb-6">#${level.position} - ${level.name}</h1>
                    <div class="flex flex-col gap-4 text-lg font-bold uppercase text-gray-700">
                        <div class="flex items-center gap-3">
                            <span>Author:</span>
                            <img src="${getFlag(level.authorCountry)}" class="w-8 h-5 border border-black">
                            <span class="text-orange-600 text-xl">${level.author}</span>
                        </div>
                        <div class="flex items-center gap-3">
    <span>Verifier:</span>
    <img src="${getFlag(level.verifierCountry)}" class="w-8 h-5 border border-black">
    <a href="${verifierLink}" 
       class="text-orange-600 text-xl hover:scale-110 transition-all font-bold">
       ${level.verifier}
    </a>
</div>
                    </div>
                </div>
            </div>

            <!-- Колонку с текстом из Q (если есть) -->
            ${level.description ? `
                <div class="mb-8 p-6 bg-gray-50 border border-gray-200 text-gray-800 leading-relaxed italic">
                    ${level.description}
                </div>
            ` : ''}
            
            <!-- Секция прошедших и проходящих -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="border border-gray-200 p-4">
                    <h2 class="font-bold border-b pb-2 mb-4 uppercase">Прошедшие</h2>
                    <div class="text-sm text-gray-700">
                        ${victorsList.length > 0 ? victorsList.map(name => `<span class="text-orange-600 font-bold">${name}</span>`).join(', ') : 'Никто еще не прошел'}
                    </div>
                </div>
                <div class="border border-gray-200 p-4">
                    <h2 class="font-bold border-b pb-2 mb-4 uppercase">Проходят</h2>
                    <div class="text-sm">
                        ${progressList.length > 0 ? progressList.map(c => `<div class="mb-2 flex justify-between"><span class="font-bold">${c[2]}</span> <span class="text-orange-600 font-black">${c[4]}%</span></div>`).join('') : '<div class="text-gray-400">Нет активных прогрессов</div>'}
                    </div>
                </div>
            </div>
        </div>
    `;
}
        async function loadNews() { 
            const container = document.getElementById('news-list'); 
            try { 
                const response = await fetch(NEWS_URL); 
                const csvText = await response.text(); 
                const rows = csvText.split('\n').slice(1); 
                const allNewsData = rows.map((row, index) => {
                    if (!row.trim()) return null;
                    const [date, title, link] = row.split(','); 
                    return { id: `news-${index}`, date: date ? date.trim() : '', title: title ? title.trim() : '' };
                }).filter(item => item !== null);
                const top10News = allNewsData.reverse().slice(0, 10);
                container.innerHTML = top10News.map(item => `<a href="news.html#${item.id}" class="stream-card block mb-3 border border-gray-200 p-4 hover:border-gray-400 hover:bg-gray-50 transition-all"><div class="text-[12px] font-bold text-orange-500 uppercase tracking-wider mb-1">${item.date}</div><div class="text-sm font-bold text-gray-900 leading-tight">${item.title}</div></a>`).join(''); 
                container.classList.add('animate-list-fade');
            } catch (err) { console.error("Ошибка новостей:", err); } 
        }

        async function loadStreams() { 
            const container = document.getElementById('streams-list'); 
            try { 
                const response = await fetch(STREAMS_URL); 
                const csvText = await response.text(); 
                const rows = csvText.split('\n').slice(1); 
                let streamData = rows.map(row => { 
                    if (!row.trim()) return null; 
                    const [status, levelName, streamer, country, percent, link] = row.split(','); 
                    const levelData = allLevels.find(l => l.name === levelName.trim()); 
                    return { status, levelName, streamer, country, percent, link, position: levelData ? levelData.position : '—' }; 
                }).filter(item => item !== null); 
                
                streamData.sort((a, b) => { const posA = a.position === '—' ? 9999 : a.position; const posB = b.position === '—' ? 9999 : b.position; return posA - posB; }); 
                
                container.innerHTML = streamData.slice(0, 5).map(item => `<div class="stream-card mb-3 border border-gray-200 rounded-none bg-white"><div class="px-4 py-3 cursor-pointer select-none hover:bg-gray-50 transition-colors" onclick="toggleDropdown(this)"><div class="flex items-center mb-1.5"><span class="flex items-center text-[10px] font-bold uppercase ${item.status.trim().toUpperCase() === 'LIVE' ? 'text-red-500' : 'text-gray-400'}"><span class="w-2 h-2 rounded-full mr-1.5 inline-block ${item.status.trim().toUpperCase() === 'LIVE' ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>${item.status}</span></div><div class="flex justify-between items-center mb-1"><div class="flex items-center gap-2"><img src="${item.country ? 'images/flags/'+item.country.trim().toLowerCase()+'.gif' : 'images/flags/WORLD.gif'}" class="w-6 h-4 border hltv-border object-cover flex-shrink-0" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900 truncate max-w-[140px]">${item.streamer}</span></div><span class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded">${item.position === '—' ? '—' : '#' + item.position}</span></div><div class="text-xs text-gray-600 font-medium truncate">${item.levelName} — <span class="font-bold text-gray-900">${item.percent}%</span></div></div><div class="dropdown-menu px-4 pb-3"><a href="${item.link}" target="_blank" class="block w-full bg-orange-600 text-white font-bold py-2 rounded text-[12px] uppercase text-center hover:bg-orange-700 transition-colors">СЛЕДИТЬ</a></div></div>`).join(''); 
                
                container.classList.add('animate-list-fade');
                document.getElementById('footer').style.opacity = '1'; 
            } catch (err) { console.error("Ошибка стримов:", err); } 
        }

        async function loadLeaderboard() { 
            const container = document.getElementById('leaderboard-list'); 
            try { 
                const res = await fetch(LEADERBOARD_URL); 
                const csvText = await res.text();
                const rows = csvText.split('\n').slice(1); 

                // Заполняем карту игроков для поиска по имени
                rows.forEach(row => {
                    if (!row.trim()) return;
                    const cols = row.split(',');
                    const playerName = cols[1]?.trim();
                    const playerId = cols[2]?.trim();
                    if (playerName && playerId) {
                        // Сохраняем в нижнем регистре для надежного поиска
                        playerMap[playerName.toLowerCase()] = playerId;
                    }
                });

                container.innerHTML = rows.slice(0, 5).map(row => { 
                    if (!row.trim()) return ''; 
                    const [place, player, id, country, pts, diff] = row.split(','); 
                    const playerLink = id ? `player.html?id=${id.trim()}` : '#'; 
                    return `<a href="${playerLink}" class="block stream-card mb-1.5 border border-gray-200 p-2.5 hover:border-gray-500 hover:bg-gray-50 transition-all"><div class="flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-sm font-bold text-gray-500 w-5">#${place?.trim()}</span><img src="images/flags/${country?.trim().toLowerCase()}.gif" class="w-5 h-3 hltv-border" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900">${player?.trim()}</span></div></div></a>`; 
                }).join('') + `<a href="/leaderboard.html" class="block w-full text-center border border-gray-200 py-2 text-xs font-bold text-orange-600 hover:bg-orange-600 hover:text-white transition-all uppercase">Полный Список</a>`; 
                
                container.classList.add('animate-list-fade');
            } catch (e) { console.error(e); } 
        }

        window.addEventListener('scroll', () => { 
            const miniLogo = document.getElementById('mini-logo-container'); 
            if (window.scrollY > 100) { miniLogo.classList.remove('w-0', 'opacity-0'); miniLogo.classList.add('w-16', 'sm:w-24', 'opacity-100'); } 
            else { miniLogo.classList.add('w-0', 'opacity-0'); miniLogo.classList.remove('w-16', 'sm:w-24', 'opacity-100'); } 
        });

        (async () => {
            await initLevelsData(); 
            loadNews(); 
            loadLeaderboard();
            const urlParams = new URLSearchParams(window.location.search);
            const levelId = urlParams.get('id');
            if (levelId) {
                renderLevelPage(levelId);
            }
        })();
    </script>
