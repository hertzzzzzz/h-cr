<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Глобальная таблица лидеров Geometry Dash, лучшие игроки и стримы.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H&CR | Level</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Montserrat', sans-serif !important; }
        html, body { background-color: #000 !important; margin: 0; padding: 0; }
        
        .dropdown-menu { display: none; transition: all 0.3s ease; }
        .dropdown-menu.show { display: block; }
        
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: scale(1.02); }
        .hltv-border { border: 1px solid #000; box-sizing: border-box; }
        
        .banner-container img { position: static !important; margin: 0 auto !important; display: block !important; }
        .banner-container, .banner-container a, .banner-container img { position: static !important; display: block !important; margin: 0 auto !important; }
        .banner-container { display: flex; justify-content: center; width: 100%; }

        .grow-text { transition: transform 0.2s ease-in-out; display: inline-block; }
        .grow-text:hover { transform: scale(1.08); }

        @keyframes listContentFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bannerFadeIn { from { opacity: 0; } to { opacity: 1; } }

        #news-list, #streams-list, #leaderboard-list { opacity: 0; }
        .animate-list-fade { animation: listContentFadeIn 0.5s ease-out forwards; }
        .animate-banner-left { opacity: 0; animation: bannerFadeIn 0.6s ease-in-out forwards; animation-delay: 150ms; }
        .animate-banner-right { opacity: 0; animation: bannerFadeIn 0.6s ease-in-out forwards; animation-delay: 300ms; }
    </style>
</head>
<body class="bg-black min-h-screen">

    <!-- Верхняя навигация -->
    <div id="top-nav" class="w-full bg-white border-b border-gray-200 sticky top-0 z-50 h-20">
        <div class="h-full flex items-stretch justify-center max-w-[1350px] mx-auto w-full px-2 sm:px-4">
            <div id="mini-logo-container" class="w-0 overflow-hidden opacity-0 transition-all duration-500 ease-in-out flex-none">
                <a href="index.html" class="h-full flex items-center justify-center px-2 sm:px-4" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;">
                    <img src="images/logo.png" alt="Logo" class="h-12 sm:h-16 w-auto block">
                </a>
            </div>
            <nav class="flex h-full font-bold uppercase text-xs sm:text-sm text-gray-800 items-stretch overflow-x-auto whitespace-nowrap">
                <a href="top.html" class="nav-item px-4 sm:px-8 flex items-center border-l border-r border-gray-200 transition-colors hover:text-orange-500 hover:bg-orange-100">LEVELS</a>
                <a href="leaderboard.html" class="nav-item px-4 sm:px-8 flex items-center border-r border-gray-200 transition-colors hover:text-orange-500 hover:bg-orange-100">PLAYERS</a>
                <a href="news.html" class="nav-item px-4 sm:px-8 flex items-center border-r border-gray-200 transition-colors hover:text-orange-500 hover:bg-orange-100">NEWS</a>
                <a href="streams.html" class="nav-item px-4 sm:px-8 flex items-center border-r border-gray-200 transition-colors hover:text-orange-500 hover:bg-orange-100">STREAMS</a>
            </nav>
        </div>
    </div>

    <!-- ГЛАВНАЯ ОБЕРТКА -->
    <div class="flex justify-center w-full gap-x-4 xl:gap-x-20">
        <div class="hidden xl:block w-[200px] flex-shrink-0 animate-banner-left">
            <div class="mt-6 flex flex-col items-center w-full">
                <a href="https://www.youtube.com/@hertzogen" class="block w-full">
                    <img src="images/left-banner.png" alt="Left Banner" class="max-w-full h-auto block mx-auto">
                </a>
            </div>
        </div>

        <div class="w-full max-w-[1350px] bg-gray-100">
            <div class="flex flex-col lg:flex-row items-stretch lg:items-start justify-center gap-4 pt-4 lg:pt-0 px-2 sm:px-4">
                
                <aside class="w-full lg:w-52 flex-shrink-0 space-y-4 order-2 lg:order-1">
                    <div class="bg-white border border-gray-200 shadow-sm overflow-hidden mb-2 lg:mb-6">
                        <a href='leaderboard.html'><h3 class="font-bold text-gray-800 uppercase p-4 border-b border-orange-200 flex justify-between">ТОП ИГРОКОВ</h3></a>
                        <div id="leaderboard-list" class="flex flex-col"></div>
                    </div>
                </aside>

                <main class="w-full lg:flex-1 min-w-0 lg:min-w-[650px] max-w-4xl bg-white min-h-screen border-l border-r border-gray-200 shadow-xl order-1 lg:order-2">
                    <div class="py-4 px-4 sm:py-6 sm:px-6 border-b border-gray-200 flex flex-col sm:flex-row gap-4 items-center justify-between text-center sm:text-left">
                        <a href="index.html" id="main-logo" class="block">
                            <img src="images/logo2.png" alt="Logo" class="h-12 sm:h-16 w-auto">
                        </a>
                        <div class="flex gap-8 uppercase font-medium text-sm text-gray-700">
                            <a href="https://demonlist.org/" class="hover:text-orange-500 transition-colors"><b>demonlist.org</b></a>
                        </div>
                    </div>
                    <div id="main-content" class="p-4 sm:p-8"></div>
                    <div id="level-players-grid" class="p-4 sm:p-8 grid grid-cols-2 sm:grid-cols-3 gap-4 border-t border-gray-200"></div>
                </main>

                <aside class="w-full lg:w-52 flex-shrink-0 space-y-4 order-3">
                    <div class="bg-white border border-gray-200 shadow-sm">
                        <a href='streams.html'><h3 class="font-bold text-gray-800 uppercase p-4 border-b border-orange-200">СТРИМЫ И ПРОГРЕССЫ</h3></a>
                        <div id="streams-list" class="flex flex-col"></div>
                    </div>
                    <div class="bg-white border border-gray-200 shadow-sm">
                        <a href='news.html'><h3 class="font-bold text-gray-800 uppercase p-4 border-b border-orange-200">Новости</h3></a>
                        <div id="news-list" class="flex flex-col"></div>
                    </div>
                </aside>
            </div>
        </div>
        
        <div class="hidden xl:block w-[200px] flex-shrink-0 animate-banner-right">
            <div class="mt-6 banner-container"> 
                <a href="https://www.youtube.com/@hertzogen" class="block" target="_blank">
                    <img src="images/right-banner.png" alt="Right Banner" class="max-w-full h-auto mx-auto" onerror="this.style.display='none'">
                </a>
            </div>
        </div>
    </div>

    <footer id="footer" class="bg-[#1a1a1a] text-white py-12 border-t-2 border-black opacity-0 transition-opacity duration-500 mt-0">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex flex-wrap justify-center items-center gap-4">
                <a href='index.html'><img src="images/logo3.png" alt="Logo" class="h-12 sm:h-16 w-auto opacity-60 hover:opacity-100 transition-opacity"></a>
                <a href='https://www.youtube.com/@hertzogen'><img src="images/logo4.png" alt="Logo" class="h-16 w-auto opacity-60 hover:opacity-100 transition-opacity"></a>
                <a href='https://demonlist.org/'><img src="images/logo5.png" alt="Logo" class="h-16 w-auto opacity-60 hover:opacity-100 transition-opacity"></a>
            </div>
            <div class="flex flex-wrap justify-center gap-6">
                <a href="https://t.me/hertzogen2007" class="text-gray-400 hover:text-orange-500 transition-colors text-base sm:text-lg font-bold uppercase">Telegram</a>
                <a href="https://www.youtube.com/@hertzogen" class="text-gray-400 hover:text-orange-500 transition-colors text-base sm:text-lg font-bold uppercase">YouTube</a>
                <a href="https://demonlist.org/" class="text-gray-400 hover:text-orange-500 transition-colors text-base sm:text-lg font-bold uppercase">demonlist</a>
            </div>
            <div class="text-center md:text-right">
                <a href="privacy-policy.html" class="text-gray-500 hover:text-white transition-colors text-sm underline">Privacy Policy</a>
            </div>
        </div>
        <p class="py-3 px-6 sm:px-12 text-gray-500 text-sm text-center md:text-left">© 2026 H&CR hertzogen</p>
    </footer>

<script>
    const URLS = { 
        players: './Players.csv', 
        levels: './Levels.csv', 
        rankings: './Rankings.csv', 
        streams: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=1466784286&single=true&output=csv', 
        news: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=30512158&single=true&output=csv', 
        records: './Records.csv'
    };
    const DB = { players: {}, levels: {}, rankings: {}, streams: [], news: [], playersArr: [], records: [] };

    function clean(val) { return String(val || '').trim(); }

    function parseCSV(csvText) {
        const rows = csvText.split('\n').filter(r => r.trim());
        if(rows.length < 2) return [];
        const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
        return rows.slice(1).map(row => { const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); let obj = {}; headers.forEach((h, i) => { let val = cols[i] ? cols[i].trim() : ''; if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1); obj[h] = val; }); return obj; });
    }

    function getParsedStreams() {
        return DB.streams.map(stream => {
            const parts = String(stream.stream_id || '').split(',');
            const pId = stream.player_id || parts[2]; 
            const lId = stream.level_id || parts[3];
            const player = DB.players[pId] || { nickname: 'Unknown', country: 'WORLD' };
            const level = DB.levels[lId] || { name: 'Unknown Level', builder: 'Unknown' };
            return { status: stream.is_live || parts[1], progress: stream.progress || parts[4], link: stream.link, player, level, rank: DB.rankings[lId] || 9999, pId, lId };
        });
    }

    async function initApp() {
        try {
            const [pRes, lRes, rRes, sRes, nRes, recRes] = await Promise.all([
                fetch(URLS.players), fetch(URLS.levels), fetch(URLS.rankings),
                fetch(URLS.streams), fetch(URLS.news), fetch(URLS.records)
            ]);

            const pTxt = await pRes.text();
            const lTxt = await lRes.text();
            const rTxt = await rRes.text();
            const sTxt = await sRes.text();
            const nTxt = await nRes.text();
            const recTxt = await recRes.text();

            const pArr = parseCSV(pTxt); 
            const lArr = parseCSV(lTxt); 
            const rArr = parseCSV(rTxt); 
            DB.streams = parseCSV(sTxt); 
            DB.news = parseCSV(nTxt); 
            DB.records = parseCSV(recTxt);
            
            pArr.forEach(p => DB.players[String(p.player_id).trim()] = p); 
            DB.playersArr = pArr;
            lArr.forEach(l => DB.levels[String(l.level_id).trim()] = l);
            rArr.forEach(r => { 
                const lId = String(r.level_id).trim(); 
                const pos = parseInt(r.position) || 9999; 
                if (!DB.rankings[lId] || pos < DB.rankings[lId]) DB.rankings[lId] = pos; 
            });
            
            renderMainContent();
            renderSidebars();
            if(document.getElementById('footer')) document.getElementById('footer').style.opacity = '1';
            
            if (document.getElementById('level-players-grid')) {
                renderLevelContent(); 
            }
        } catch (err) { 
            console.error("Ошибка инициализации:", err); 
        }
    }

    function renderMainContent() {
        const container = document.getElementById('main-content');
        if(!container) return;
        const urlParams = new URLSearchParams(window.location.search);
        const levelId = urlParams.get('id');
        const level = DB.levels[levelId];
        
        if (!level) { container.innerHTML = '<div class="text-gray-400 font-bold p-8">Уровень не найден</div>'; return; }

        const verifier = DB.players[clean(level.verifier_id)] || { nickname: 'Unknown', country: 'WORLD' };
        const victorsList = DB.records.filter(r => String(r.level_id).trim() === levelId && String(r.progress).trim() === '100');
        const progressList = getParsedStreams().filter(s => String(s.lId).trim() === levelId && parseInt(s.progress) < 100);

        const getFlag = (code) => `images/flags/${(code||'WORLD').toLowerCase()}.gif`;

        // Очки берутся из CSV (колонка points), если их нет — 0
        const points = level.points || '0';

        container.innerHTML = `
            <div class="animate-list-fade p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div class="flex flex-col gap-4">
                        <img src="${level.thumbnail}" class="w-full aspect-video object-cover" onerror="this.src='images/default.jpg'">
                        ${level.video_url ? `<a href="${level.video_url}" target="_blank" class="block w-full bg-black text-white py-3 font-bold uppercase text-center hover:bg-orange-600 transition-colors shadow-lg">Смотреть видео</a>` : ''}
                    </div>
                    <div class="flex flex-col justify-center">
                        <h1 class="text-4xl font-black uppercase mb-2">#${DB.rankings[levelId] || '—'} - ${level.name}</h1>
                        <span class="bg-orange-600 text-white font-bold px-3 py-1 rounded text-sm inline-block w-fit mb-6">${points} PTS</span>
                        <div class="flex flex-col gap-4 text-lg font-bold uppercase text-gray-700">
                            <div class="flex items-center gap-3">
                                <span>Builder:</span>
                                <span class="text-orange-600 text-xl inline-block font-bold">${level.builder || 'Unknown'}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span>Verifier:</span>
                                <img src="${getFlag(verifier.country)}" class="w-8 h-5 border border-black" onerror="this.style.display='none'">
                                <a href="player.html?id=${level.verifier_id}" class="text-orange-600 text-xl hover:scale-110 transition-transform inline-block font-bold">${verifier.nickname}</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="border border-gray-200 p-6 bg-gray-50 mb-8">
                    <h2 class="font-bold border-b border-gray-300 pb-2 mb-4 uppercase text-gray-800">Информация</h2>
                    <p class="text-sm sm:text-base text-gray-700 leading-relaxed">${level.info || 'Информация отсутствует.'}</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="border border-gray-200 p-4">
                        <h2 class="font-bold border-b pb-2 mb-4 uppercase">Прошедшие</h2>
                        <div class="text-sm text-gray-700">${victorsList.length > 0 ? victorsList.map(r => `<a href="player.html?id=${r.player_id}" class="text-orange-600 font-bold block hover:scale-105 transition-transform">${DB.players[r.player_id]?.nickname || 'Unknown'}</a>`).join('') : 'Никто'}</div>
                    </div>
                    <div class="border border-gray-200 p-4">
                        <h2 class="font-bold border-b pb-2 mb-4 uppercase">Проходят</h2>
                        <div class="text-sm">${progressList.length > 0 ? progressList.map(s => `<div class="mb-2 flex justify-between"><span class="font-bold">${s.player.nickname}</span> <span class="text-orange-600 font-black">${s.progress}%</span></div>`).join('') : 'Нет'}</div>
                    </div>
                </div>
            </div>`;
    }

    function renderLevelContent() {
        const urlParams = new URLSearchParams(window.location.search);
        const lId = clean(urlParams.get('id')); 
        const grid = document.getElementById('level-players-grid');
        if (!grid) return;
        
        const levelRecords = DB.records.filter(r => clean(r.level_id) === lId);
        
        grid.innerHTML = levelRecords.length > 0 ? levelRecords.map(r => {
            const player = DB.players[clean(r.player_id)] || { nickname: 'Unknown', country: 'WORLD' };
            const progress = clean(r.progress); // Берем реальный прогресс
            
            // Красим в зеленый только если 100, иначе оставляем серым
            const colorClass = progress === '100' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700';
            
            return `<a href="player.html?id=${clean(r.player_id)}" class="bg-gray-50 border border-gray-200 p-3 flex items-center gap-3 hover:border-orange-500 transition-all">
                <img src="images/flags/${clean(player.country).toLowerCase()}.gif" class="w-6 h-4 border hltv-border" onerror="this.src='images/flags/WORLD.gif'">
                <span class="font-bold text-gray-800 text-sm">${player.nickname}</span>
                <span class="ml-auto text-[10px] ${colorClass} font-bold px-2 py-0.5 rounded">${progress}%</span>
            </a>`;
        }).join('') : '<p class="text-center text-gray-500">Записей пока нет.</p>';
    }

    function renderSidebars() {
        const leadList = DB.playersArr.filter(p => p.is_banned !== 'TRUE' && p.is_banned !== 'true').sort((a,b) => (parseInt(b.points)||0) - (parseInt(a.points)||0)).slice(0, 5);
        const lContainer = document.getElementById('leaderboard-list');
        if (lContainer) lContainer.innerHTML = leadList.map((p, i) => `<a href="player.html?id=${p.player_id}" class="block stream-card mb-1.5 border border-gray-200 p-2.5 hover:border-gray-500 hover:bg-gray-50 transition-all"><div class="flex items-center gap-2"><span class="text-sm font-bold text-gray-500 w-5">#${i+1}</span><img src="images/flags/${(p.country||'WORLD').toLowerCase()}.gif" class="w-5 h-3 hltv-border" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900">${p.nickname}</span></div></a>`).join('') + `<a href="leaderboard.html" class="block w-full text-center border border-gray-200 py-2 text-xs font-bold text-orange-600 hover:bg-orange-600 hover:text-white transition-all uppercase">Полный Список</a>`, lContainer.classList.add('animate-list-fade');

        const streamsContainer = document.getElementById('streams-list');
        if (streamsContainer) {
            const streams = getParsedStreams().sort((a, b) => a.rank - b.rank).slice(0, 5);
            streamsContainer.innerHTML = streams.map(s => { const isLive = String(s.status).trim().toUpperCase() === 'LIVE'; return `<div class="stream-card mb-3 border border-gray-200 bg-white"><div class="px-4 py-3 cursor-pointer hover:bg-gray-50 transition-colors" onclick="toggleDropdown(this)"><div class="flex items-center mb-1.5"><span class="flex items-center text-[10px] font-bold uppercase ${isLive ? 'text-red-500' : 'text-gray-400'}"><span class="w-2 h-2 rounded-full mr-1.5 inline-block ${isLive ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>${isLive ? 'LIVE' : 'OFFLINE'}</span></div><div class="flex justify-between items-center mb-1"><div class="flex items-center gap-2"><img src="images/flags/${(s.player.country||'WORLD').toLowerCase()}.gif" class="w-6 h-4 border hltv-border object-cover" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900 truncate max-w-[140px]">${s.player.nickname}</span></div><span class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded">#${s.rank === 9999 ? '—' : s.rank}</span></div><div class="text-xs text-gray-600 font-medium truncate">${s.level.name} — <span class="font-bold text-gray-900">${s.progress}%</span></div></div><div class="dropdown-menu px-4 pb-3" style="display: none;"><a href="${s.link}" target="_blank" class="block w-full bg-orange-600 text-white font-bold py-2 rounded text-[12px] uppercase text-center hover:bg-orange-700">СЛЕДИТЬ</a></div></div>`; }).join(''), streamsContainer.classList.add('animate-list-fade');
        }

        const newsContainer = document.getElementById('news-list');
        if (newsContainer) newsContainer.innerHTML = DB.news.slice(-5).reverse().map((n, i) => `<a href="news.html#news-${DB.news.length - 1 - i}" class="stream-card block mb-3 border border-gray-200 p-4 hover:border-gray-400 hover:bg-gray-50 transition-all"><div class="text-[12px] font-bold text-orange-500 uppercase tracking-wider mb-1">${n['хедлайнер'] || n['date'] || ''}</div><div class="text-sm font-bold text-gray-900 leading-tight">${n['заголовок'] || n['title'] || ''}</div></a>`).join(''), newsContainer.classList.add('animate-list-fade');
    }

    function toggleDropdown(el) { const menu = el.closest('.stream-card').querySelector('.dropdown-menu'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; }
    initApp();
</script>
</body>
</html>
