    <!-- ТВОЙ СКРИПТ -->

    <script>
        const URLS = { 
    players: './Players.csv', 
    levels: './Levels.csv', 
    rankings: './Rankings.csv', 
    streams: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=1466784286&single=true&output=csv&cache_bust=123', 
    news: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=30512158&single=true&output=csv' 
};
        const DB = { players: {}, levels: {}, rankings: {}, streams: [], news: [], playersArr: [] };

        // 1. НАСТОЯЩИЙ CSV-ПАРСЕР (не ломается от переносов строк внутри ячеек)
function parseCSV(text) {
    const rows = [];
    let currentRow = [];
    let currentCell = '';
    let insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"') {
            if (insideQuotes && nextChar === '"') {
                currentCell += '"'; // Экранированная кавычка
                i++; 
            } else {
                insideQuotes = !insideQuotes;
            }
        } else if (char === ',' && !insideQuotes) {
            currentRow.push(currentCell);
            currentCell = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
            if (char === '\r' && nextChar === '\n') i++; // Пропускаем \n после \r
            currentRow.push(currentCell);
            rows.push(currentRow);
            currentRow = [];
            currentCell = '';
        } else {
            currentCell += char;
        }
    }
    if (currentCell !== '' || currentRow.length > 0) {
        currentRow.push(currentCell);
        rows.push(currentRow);
    }
    
    // Удаляем пустую строку в конце, если есть
    if (rows.length && rows[rows.length - 1].length === 1 && rows[rows.length - 1][0] === '') {
        rows.pop();
    }

    if (rows.length < 2) return [];
    
    const headers = rows[0].map(h => h.trim().toLowerCase());
    return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, idx) => {
            obj[h] = row[idx] ? row[idx].trim() : '';
        });
        return obj;
    });
}

// 2. ЧИСТАЯ И ПРОСТАЯ СБОРКА СТРИМОВ
function getParsedStreams() {
    return DB.streams.map(stream => {
        const pId = stream.player_id; 
        const lId = stream.level_id;
        
        if (!pId || !lId) return null; // Пропускаем пустые строки

        const player = DB.players[String(pId).trim()] || { nickname: 'Unknown', country: 'WORLD' };
        const level = DB.levels[String(lId).trim()] || { name: 'Unknown Level' };
        
        // Жестко вычищаем из ссылки любые случайные абзацы или пробелы, которые пришли из Google Таблиц
        const link = stream.link ? stream.link.replace(/[\r\n\s]+/g, '') : '#';

        return { 
            status: stream.is_live || 'LIVE', 
            progress: stream.progress || '0', 
            link: link, 
            player, 
            level, 
            rank: DB.rankings[String(lId).trim()] || 9999 
        };
    }).filter(s => s !== null);
}

        async function initApp() {
            try {
                const responses = await Promise.all([fetch(URLS.players), fetch(URLS.levels), fetch(URLS.rankings), fetch(URLS.streams), fetch(URLS.news)]);
                const texts = await Promise.all(responses.map(res => res.text()));

                const pArr = parseCSV(texts[0]); 
                const lArr = parseCSV(texts[1]); // <-- Вот наш массив уровней
                const rArr = parseCSV(texts[2]); 
                DB.streams = parseCSV(texts[3]); 
                DB.news = parseCSV(texts[4]);
                
                pArr.forEach(p => DB.players[String(p.player_id).trim()] = p); 
                DB.playersArr = pArr;
                
                lArr.forEach(l => DB.levels[String(l.level_id).trim()] = l);
                
                rArr.forEach(r => { 
                    const lId = String(r.level_id).trim(); 
                    const pos = parseInt(r.position) || 9999; 
                    if (!DB.rankings[lId] || pos < DB.rankings[lId]) DB.rankings[lId] = pos; 
                });

                renderSidebars(); 
                renderLocalNews();
                
                // ИСПРАВЛЕНО: Вызываем правильную функцию и передаем правильную переменную (lArr)
                renderTopLevels(lArr); 
                
            } catch (err) { console.error("Ошибка инициализации:", err); }
        }

        
        
        function renderLocalNews() {
            const container = document.getElementById('main-news-list');
            if (!container || typeof MY_NEWS_DATABASE === 'undefined') return;

            container.innerHTML = MY_NEWS_DATABASE.map(news => `
                <div class="bg-white border border-gray-200 mb-6 shadow-sm overflow-hidden stream-card">
                    ${news.image ? `<img src="${news.image}" class="w-full h-48 sm:h-64 object-cover hltv-border" alt="News Image">` : ''}
                    <div class="p-5">
                        <div class="text-m font-bold text-orange-600 mb-1 uppercase tracking-wide">${news.category || 'НОВОСТЬ'} • ${news.date || ''}</div>
                        <h2 class="text-xl sm:text-2xl font-bold text-gray-900 mb-0">${news.title || ''}</h2>
                        <div class="text-sm sm:text-base text-gray-700 leading-normal whitespace-pre-line -mt-1">
                            ${(news.text || '').trim()}
                        </div>
                    </div>
                </div>
            `).join('');
            container.classList.add('animate-list-fade');
        }

        function renderSidebars() {
            const leadList = DB.playersArr.filter(p => p.is_banned !== 'TRUE' && p.is_banned !== 'true').sort((a,b) => (parseInt(b.points)||0) - (parseInt(a.points)||0)).slice(0, 5);
            const lContainer = document.getElementById('leaderboard-list');
            if (lContainer) { lContainer.innerHTML = leadList.map((p, i) => `<a href="player?id=${p.player_id}" class="block stream-card mb-1.5 border border-gray-200 p-2.5 hover:border-gray-500 hover:bg-gray-50 transition-all"><div class="flex items-center gap-2"><span class="text-sm font-bold text-gray-500 w-5">#${i+1}</span><img src="images/flags/${(p.country||'WORLD').toLowerCase()}.gif" class="w-5 h-3 hltv-border" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900">${p.nickname}</span></div></a>`).join('') + `<a href="leaderboard" class="block w-full text-center border border-gray-200 py-2 text-xs font-bold text-orange-600 hover:bg-orange-600 hover:text-white transition-all uppercase">Полный Список</a>`; lContainer.classList.add('animate-list-fade'); }

            const streamsContainer = document.getElementById('streams-list');
            if (streamsContainer) {
                const streams = getParsedStreams().sort((a, b) => a.rank - b.rank).slice(0, 5);
                streamsContainer.innerHTML = streams.map(s => {
                    const isLive = String(s.status).trim().toUpperCase() === 'LIVE';
                    return `<div class="stream-card mb-3 border border-gray-200 bg-white"><div class="px-4 py-3 cursor-pointer hover:bg-gray-50 transition-colors" onclick="toggleDropdown(this)"><div class="flex items-center mb-1.5"><span class="flex items-center text-[10px] font-bold uppercase ${isLive ? 'text-red-500' : 'text-gray-400'}"><span class="w-2 h-2 rounded-full mr-1.5 inline-block ${isLive ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>${isLive ? 'LIVE' : 'OFFLINE'}</span></div><div class="flex justify-between items-center mb-1"><div class="flex items-center gap-2"><img src="images/flags/${(s.player.country||'WORLD').toLowerCase()}.gif" class="w-6 h-4 border hltv-border object-cover" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900 truncate max-w-[140px]">${s.player.nickname}</span></div><span class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded">#${s.rank === 9999 ? '—' : s.rank}</span></div><div class="text-xs text-gray-600 font-medium truncate">${s.level.name} — <span class="font-bold text-gray-900">${s.progress}%</span></div></div><div class="dropdown-menu px-4 pb-3" style="display: none;"><a href="${s.link}" target="_blank" class="block w-full bg-orange-600 text-white font-bold py-2 rounded text-[12px] uppercase text-center hover:bg-orange-700">СЛЕДИТЬ</a></div></div>`;
                }).join('');
                streamsContainer.classList.add('animate-list-fade');
            }

            const newsContainer = document.getElementById('news-list');
            if (newsContainer) { newsContainer.innerHTML = DB.news.slice(-5).reverse().map((n, i) => `<a href="news.html#news-${DB.news.length - 1 - i}" class="stream-card block mb-3 border border-gray-200 p-4 hover:border-gray-400 hover:bg-gray-50 transition-all"><div class="text-[12px] font-bold text-orange-500 uppercase tracking-wider mb-1">${n['хедлайнер'] || n['date'] || ''}</div><div class="text-sm font-bold text-gray-900 leading-tight">${n['заголовок'] || n['title'] || ''}</div></a>`).join(''); newsContainer.classList.add('animate-list-fade'); }
            if(document.getElementById('footer')) document.getElementById('footer').style.opacity = '1';
        }

        function toggleDropdown(el) { const menu = el.closest('.stream-card').querySelector('.dropdown-menu'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; }
        window.addEventListener('scroll', () => { const miniLogo = document.getElementById('mini-logo-container'); if (miniLogo) { if (window.scrollY > 100) { miniLogo.classList.remove('w-0', 'opacity-0'); miniLogo.classList.add('w-16', 'sm:w-24', 'opacity-100'); } else { miniLogo.classList.add('w-0', 'opacity-0'); miniLogo.classList.remove('w-16', 'sm:w-24', 'opacity-100'); } } });

        
        initApp();
    </script>
