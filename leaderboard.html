    <style>
        * { font-family: 'Montserrat', sans-serif !important; }
        html, body { background-color: #000 !important; margin: 0; padding: 0; }
        
        /* Анимация плавного появления меню */
        .dropdown-menu { display: none; transition: all 0.3s ease; }
        .dropdown-menu.show { display: block; }
        
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: scale(1.03); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .hltv-border { border: 1px solid #000; box-sizing: border-box; }
        
        .banner-container img {
            position: static !important;
            margin: 0 auto !important;
            display: block !important;
        }
        .banner-container, .banner-container a, .banner-container img {
            position: static !important; 
            display: block !important;
            margin: 0 auto !important;
        }
        
        .banner-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* --- ЭФФЕКТ УВЕЛИЧЕНИЯ НИКА ПРИ НАВЕДЕНИИ --- */
        .grow-text { 
            transition: transform 0.2s ease-in-out; 
            display: inline-block; 
        }

        /* --- НОВЫЕ СТИЛИ АНИМАЦИЙ ДЛЯ ТЕМПЛЕЙТА --- */
        @keyframes listContentFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bannerFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #news-list, #streams-list, #leaderboard-list {
            opacity: 0;
        }

        .animate-list-fade {
            animation: listContentFadeIn 0.5s ease-out forwards;
        }

        .animate-banner-left {
            opacity: 0;
            animation: bannerFadeIn 0.6s ease-in-out forwards;
            animation-delay: 150ms;
        }
        .animate-banner-right {
            opacity: 0;
            animation: bannerFadeIn 0.6s ease-in-out forwards;
            animation-delay: 300ms;
        }
        #main-profile-card {
            background-image: url('https://i.postimg.cc/wB24crD6/Bez-nazvania170-20260713223113.png') !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
        }
    </style>

    <script>
        // === 1. ССЫЛКИ НА НОВЫЕ ТАБЛИЦЫ ===
        const URLS = { 
            players: './Players.csv', 
            levels: './Levels.csv', 
            rankings: './Rankings.csv', 
            streams: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=1466784286&single=true&output=csv', 
            news: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=30512158&single=true&output=csv' 
        };

        const DB = {
            players: {}, 
            levels: {}, 
            rankings: {}, 
            streams: [],
            news: [],
            sortedPlayers: [] // Добавлено для хранения игроков
        };

        let currentLoaded = 0; // Счетчик показанных игроков
        const CHUNK_SIZE = 50; // Сколько игроков грузить за один раз

        // === 2. УМНЫЙ ПАРСЕР CSV ===
        function parseCSV(text) {
    const rows = [];
    let currentRow = [];
    let currentCell = '';
    let insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"') {
            if (insideQuotes && nextChar === '"') {
                currentCell += '"'; // Экранированная кавычка
                i++; 
            } else {
                insideQuotes = !insideQuotes;
            }
        } else if (char === ',' && !insideQuotes) {
            currentRow.push(currentCell);
            currentCell = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
            if (char === '\r' && nextChar === '\n') i++; // Пропускаем \n после \r
            currentRow.push(currentCell);
            rows.push(currentRow);
            currentRow = [];
            currentCell = '';
        } else {
            currentCell += char;
        }
    }
    if (currentCell !== '' || currentRow.length > 0) {
        currentRow.push(currentCell);
        rows.push(currentRow);
    }
    
    // Удаляем пустую строку в конце, если есть
    if (rows.length && rows[rows.length - 1].length === 1 && rows[rows.length - 1][0] === '') {
        rows.pop();
    }

    if (rows.length < 2) return [];
    
    const headers = rows[0].map(h => h.trim().toLowerCase());
    return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, idx) => {
            obj[h] = row[idx] ? row[idx].trim() : '';
        });
        return obj;
    });
}

        function getCacheSafeUrl(url) {
            const separator = url.includes('?') ? '&' : '?';
            return url + separator + 't=' + new Date().getTime();
        }

        // === 3. ГЛАВНАЯ ФУНКЦИЯ ЗАГРУЗКИ ===
        async function initApp() {
            try {
                const responses = await Promise.all([
                    fetch(getCacheSafeUrl(URLS.players)), 
                    fetch(getCacheSafeUrl(URLS.levels)),
                    fetch(getCacheSafeUrl(URLS.rankings)), 
                    fetch(getCacheSafeUrl(URLS.streams)),
                    fetch(getCacheSafeUrl(URLS.news))
                ]);
                
                const texts = await Promise.all(responses.map(res => res.text()));

                const playersArray = parseCSV(texts[0]);
                const levelsArray = parseCSV(texts[1]);
                const rankingsArray = parseCSV(texts[2]);
                DB.streams = parseCSV(texts[3]);
                DB.news = parseCSV(texts[4]);

                playersArray.forEach(p => DB.players[p.player_id] = p);
                levelsArray.forEach(l => DB.levels[l.level_id] = l);
                
                rankingsArray.forEach(r => {
                    const lId = r.level_id;
                    const pos = parseInt(r.position) || 9999;
                    if (!DB.rankings[lId] || pos < DB.rankings[lId]) {
                        DB.rankings[lId] = pos;
                    }
                });

                renderLeaderboard(playersArray);
                renderStreams();
                renderNews();

                document.getElementById('footer').style.opacity = '1';

            } catch (err) {
                console.error("Ошибка инициализации базы данных:", err);
            }
        }

        // === 4. РЕНДЕР ЛИДЕРБОРДА И ЛЕНИВАЯ ЗАГРУЗКА ===
        function renderLeaderboard(playersArray) {
            const sidebarContainer = document.getElementById('leaderboard-list'); 
            const mainGridContainer = document.getElementById('main-leaderboard-grid');

            // Сортируем и сохраняем глобально ОДИН РАЗ
            DB.sortedPlayers = playersArray
                .filter(p => p.is_banned !== 'TRUE' && p.is_banned !== 'true')
                .sort((a, b) => (parseInt(b.points) || 0) - (parseInt(a.points) || 0));

            // Рендер сайдбара (топ 5)
            sidebarContainer.innerHTML = DB.sortedPlayers.slice(0, 5).map((p, index) => {
                const countryCode = (p.country || 'WORLD').toLowerCase();
                return `<a href="player?id=${p.player_id}" class="block stream-card mb-1.5 border border-gray-200 p-2.5 hover:border-gray-500 hover:bg-gray-50 transition-all"><div class="flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-sm font-bold text-gray-500 w-5">#${index + 1}</span><img src="images/flags/${countryCode}.gif" class="w-5 h-3 hltv-border" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900">${p.nickname}</span></div></div></a>`;
            }).join('') + `<a href="leaderboard" class="block w-full text-center border border-gray-200 py-2 text-xs font-bold text-orange-600 hover:bg-orange-600 hover:text-white transition-all uppercase">Полный Список</a>`;
            sidebarContainer.classList.add('animate-list-fade');

            // Очищаем сетку перед стартом
            mainGridContainer.innerHTML = '';
            currentLoaded = 0;
            
            // Загружаем первую порцию (50 карточек)
            loadMorePlayers();
        }

        function loadMorePlayers() {
            const grid = document.getElementById('main-leaderboard-grid');
            const btnContainer = document.getElementById('load-more-container');
            
            // Берем следующую порцию (по умолчанию 50 штук)
            const nextChunk = DB.sortedPlayers.slice(currentLoaded, currentLoaded + CHUNK_SIZE);
            
            nextChunk.forEach((p, index) => {
                const globalIndex = currentLoaded + index;
                const diffValue = parseInt(p.diff) || 0;
                let diffHtml = diffValue > 0 ? `<span class="text-green-400 font-bold ml-1 text-xs sm:text-sm">+${diffValue}</span>` : 
                               diffValue < 0 ? `<span class="text-red-400 font-bold ml-1 text-xs sm:text-sm">-${Math.abs(diffValue)}</span>` : 
                               `<span class="text-gray-400 font-bold ml-1 text-xs sm:text-sm">-</span>`;
                
                const countryCode = (p.country || 'WORLD').toLowerCase();
                const photoSrc = p.photo || 'images/default-profile.png';

                // Создаем элемент карточки
                const card = document.createElement('a');
                card.href = `player?id=${p.player_id}`;
                card.className = "bg-white border border-gray-200 flex flex-col overflow-hidden card-hover relative group block opacity-0 animate-list-fade";
                card.style.animationDelay = `${(index % CHUNK_SIZE) * 0.04}s`; // Плавное появление порции

                card.innerHTML = `
                    <div class="w-full aspect-[4/3] bg-gray-300 relative overflow-hidden">
                        <div class="absolute top-0 left-0 bg-black/85 text-white font-bold text-sm sm:text-base px-2.5 py-1 z-10 flex items-center gap-1 rounded-br">
                            <span>#${globalIndex + 1}</span>
                            ${diffHtml}
                        </div>
                        <div class="absolute top-0 right-0 bg-orange-600 text-white font-bold text-[11px] sm:text-xs px-2.5 py-1 z-10 rounded-bl tracking-wide">
                            ${p.points || 0} PTS
                        </div>
                        <img src="${photoSrc}" alt="${p.nickname}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" 
                             onerror="this.src='images/default-profile.png';">
                    </div>
                    <div class="p-2.5 bg-white border-t border-gray-100 flex items-center min-w-0">
                        <div class="flex items-center gap-1.5 min-w-0 w-full">
                            <img src="images/flags/${countryCode}.gif" class="w-5 h-3.5 object-cover border hltv-border flex-shrink-0" onerror="this.src='images/flags/WORLD.gif'">
                            <span class="text-xs sm:text-sm font-bold text-gray-900 truncate grow-text group-hover:text-orange-600 transition-colors">
                                ${p.nickname}
                            </span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });

            currentLoaded += nextChunk.length;

            // Если загрузили всех игроков из базы — скрываем кнопку
            if (currentLoaded >= DB.sortedPlayers.length) {
                btnContainer.classList.add('hidden');
                btnContainer.classList.remove('block');
            } else {
                btnContainer.classList.remove('hidden');
                btnContainer.classList.add('block');
            }
        }

        // === 5. РЕНДЕР СТРИМОВ ===
        function renderStreams() {
            const container = document.getElementById('streams-list');
            const streamData = DB.streams.map(stream => {
                const parts = String(stream.stream_id || '').split(',');
                const pId = stream.player_id || parts[2]; 
                const lId = stream.level_id || parts[3];
                const status = stream.is_live || parts[1];
                const progress = stream.progress || parts[4];

                const player = DB.players[pId] || {};
                const level = DB.levels[lId] || {};

                return {
                    status: status, percent: progress, link: stream.link,
                    streamer: player.nickname || 'Unknown', country: player.country || 'WORLD',
                    levelName: level.name || 'Unknown Level', position: DB.rankings[lId] || 9999
                };
            });

            streamData.sort((a, b) => a.position - b.position);

            container.innerHTML = streamData.slice(0, 5).map(item => {
                const isLive = String(item.status).trim().toUpperCase() === 'LIVE';
                const posText = item.position === 9999 ? '—' : '#' + item.position;
                const flagSrc = `images/flags/${String(item.country).toLowerCase()}.gif`;

                return `<div class="stream-card mb-3 border border-gray-200 rounded-none bg-white">
                    <div class="px-4 py-3 cursor-pointer select-none hover:bg-gray-50 transition-colors" onclick="toggleDropdown(this)">
                        <div class="flex items-center mb-1.5">
                            <span class="flex items-center text-[10px] font-bold uppercase ${isLive ? 'text-red-500' : 'text-gray-400'}">
                                <span class="w-2 h-2 rounded-full mr-1.5 inline-block ${isLive ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>
                                ${isLive ? 'LIVE' : 'OFFLINE'}
                            </span>
                        </div>
                        <div class="flex justify-between items-center mb-1">
                            <div class="flex items-center gap-2">
                                <img src="${flagSrc}" class="w-6 h-4 border hltv-border object-cover flex-shrink-0" onerror="this.src='images/flags/WORLD.gif'">
                                <span class="text-sm font-bold text-gray-900 truncate max-w-[140px]">${item.streamer}</span>
                            </div>
                            <span class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded">${posText}</span>
                        </div>
                        <div class="text-xs text-gray-600 font-medium truncate mt-1">
                            ${item.levelName} — <span class="font-bold text-gray-900">${item.percent}%</span>
                        </div>
                    </div>
                    <div class="dropdown-menu px-4 pb-3">
                        <a href="${item.link}" target="_blank" class="block w-full bg-orange-600 text-white font-bold py-2 rounded text-[12px] uppercase text-center hover:bg-orange-700 transition-colors">СЛЕДИТЬ</a>
                    </div>
                </div>`;
            }).join('');

            container.classList.add('animate-list-fade');
        }

        // === 6. РЕНДЕР НОВОСТЕЙ ===
        function renderNews() {
            const container = document.getElementById('news-list');
            const top10News = DB.news.reverse().slice(0, 10);

            container.innerHTML = top10News.map((item, index) => {
                const date = item['хедлайнер'] || '';
                const title = item['заголовок'] || '';
                
                return `
                    <a href="news.html#news-${index}" class="stream-card block mb-3 border border-gray-200 p-4 hover:border-gray-400 hover:bg-gray-50 transition-all">
                        <div class="text-[12px] font-bold text-orange-500 uppercase tracking-wider mb-1">${date}</div>
                        <div class="text-sm font-bold text-gray-900 leading-tight">${title}</div>
                    </a>`;
            }).join('');
            
            container.classList.add('animate-list-fade');
        }

        // UI логика
        function toggleDropdown(element) { 
            const menu = element.closest('.stream-card')?.querySelector('.dropdown-menu'); 
            if (menu) menu.classList.toggle('show'); 
        }

        window.addEventListener('scroll', () => { 
            const miniLogo = document.getElementById('mini-logo-container'); 
            if (window.scrollY > 100) { 
                miniLogo.classList.remove('w-0', 'opacity-0'); 
                miniLogo.classList.add('w-16', 'sm:w-24', 'opacity-100'); 
            } else { 
                miniLogo.classList.add('w-0', 'opacity-0'); 
                miniLogo.classList.remove('w-16', 'sm:w-24', 'opacity-100'); 
            } 
        });

        // Запуск!
        initApp();
    </script>
</body>
</html>
