<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Глобальная таблица лидеров Geometry Dash, лучшие игроки и стримы.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H&CR | Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Montserrat', sans-serif !important; }
        html, body { background-color: #000 !important; margin: 0; padding: 0; }
        
        /* Анимация плавного появления меню */
        .dropdown-menu { display: none; transition: all 0.3s ease; }
        .dropdown-menu.show { display: block; }
        
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: scale(1.03); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .hltv-border { border: 1px solid #000; box-sizing: border-box; }
        
        .banner-container img {
            position: static !important;
            margin: 0 auto !important;
            display: block !important;
        }
        .banner-container, .banner-container a, .banner-container img {
            position: static !important; 
            display: block !important;
            margin: 0 auto !important;
        }
        
        .banner-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* --- ЭФФЕКТ УВЕЛИЧЕНИЯ НИКА ПРИ НАВЕДЕНИИ --- */
        .grow-text { 
            transition: transform 0.2s ease-in-out; 
            display: inline-block; 
        }

        /* --- НОВЫЕ СТИЛИ АНИМАЦИЙ ДЛЯ ТЕМПЛЕЙТА --- */
        @keyframes listContentFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bannerFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #news-list, #streams-list, #leaderboard-list, #main-leaderboard-grid {
            opacity: 0;
        }

        .animate-list-fade {
            animation: listContentFadeIn 0.5s ease-out forwards;
        }

        .animate-banner-left {
            opacity: 0;
            animation: bannerFadeIn 0.6s ease-in-out forwards;
            animation-delay: 150ms;
        }
        .animate-banner-right {
            opacity: 0;
            animation: bannerFadeIn 0.6s ease-in-out forwards;
            animation-delay: 300ms;
        }
    </style>
</head>
<body class="bg-black min-h-screen">

    <!-- Верхняя навигация -->
    <div id="top-nav" class="w-full bg-white border-b border-gray-200 sticky top-0 z-50 h-20">
        <div class="h-full flex items-stretch justify-center max-w-[1350px] mx-auto w-full px-2 sm:px-4">
            
            <div id="mini-logo-container" class="w-0 overflow-hidden opacity-0 transition-all duration-500 ease-in-out flex-none">
                <a href="index.html" class="h-full flex items-center justify-center px-2 sm:px-4" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;">
                    <img src="images/logo.png" alt="Logo" class="h-12 sm:h-16 w-auto block">
                </a>
            </div>

            <nav class="flex h-full font-bold uppercase text-xs sm:text-sm text-gray-800 items-stretch overflow-x-auto whitespace-nowrap">
                <a href="top.html" class="nav-item px-4 sm:px-8 flex items-center border-l border-r border-gray-200 transition-colors hover:text-orange-500 hover:bg-orange-100">TOP-100</a>
                <a href="leaderboard.html" class="nav-item px-4 sm:px-8 flex items-center border-r border-gray-200 transition-colors hover:text-orange-500 hover:bg-orange-100">LEADERBOARD</a>
                <a href="news.html" class="nav-item px-4 sm:px-8 flex items-center border-r border-gray-200 transition-colors hover:text-orange-500 hover:bg-orange-100">NEWS</a>
                <a href="streams.html" class="nav-item px-4 sm:px-8 flex items-center border-r border-gray-200 transition-colors hover:text-orange-500 hover:bg-orange-100">STREAMS</a>
            </nav>
        </div>
    </div>

    <!-- ГЛАВНАЯ ОБЕРТКА -->
    <div class="flex justify-center w-full gap-x-4 xl:gap-x-20">
        
        <!-- ЛЕВЫЙ ВНЕШНИЙ БАННЕР -->
        <div class="hidden xl:block w-[200px] flex-shrink-0 animate-banner-left">
            <div class="mt-6 flex flex-col items-center w-full">
                <a href="https://www.youtube.com/@hertzogen" class="block w-full">
                    <img src="images/left-banner.png" alt="Left Banner" class="max-w-full h-auto block mx-auto">
                </a>
            </div>
        </div>

        <!-- КОНТЕНТНАЯ ЗОНА -->
        <div class="w-full max-w-[1350px] bg-gray-100">
            
            <div class="flex flex-col lg:flex-row items-stretch lg:items-start justify-center gap-4 pt-4 lg:pt-0 px-2 sm:px-4">
                
                <!-- ЛЕВАЯ КОЛОНКА (ТОП ИГРОКОВ В САЙДБАРЕ) -->
                <aside class="w-full lg:w-52 flex-shrink-0 space-y-4 order-2 lg:order-1">
                    <div class="bg-white border border-gray-200 shadow-sm overflow-hidden mb-2 lg:mb-6">
                        <a href='leaderboard.html'><h3 class="font-bold text-gray-800 uppercase p-4 border-b border-orange-200 flex justify-between">ТОП ИГРОКОВ</h3></a>
                        <div id="leaderboard-list" class="flex flex-col"></div>
                    </div>
                </aside>

                <!-- ЦЕНТРАЛЬНЫЙ БЛОК -->
                <main class="w-full lg:flex-1 min-w-0 lg:min-w-[650px] max-w-4xl bg-white min-h-screen border-l border-r border-gray-200 shadow-xl order-1 lg:order-2">
                    <div class="py-4 px-4 sm:py-6 sm:px-6 border-b border-gray-200 flex flex-col sm:flex-row gap-4 items-center justify-between text-center sm:text-left">
                        <a href="index.html" id="main-logo" class="block">
                            <img src="images/logo2.png" alt="Logo" class="h-12 sm:h-16 w-auto">
                        </a>
                        <div class="flex gap-8 uppercase font-medium text-sm text-gray-700">
                            <a href="https://www.pointercrate.com" class="hover:text-orange-500 transition-colors"><b>PointerCrate.com</b></a>
                        </div>
                    </div>

                    <!-- ОСНОВНОЙ КОНТЕНТ ЛИДЕРБОРДА -->
                    <div id="main-content" class="p-4 sm:p-6">
                        <div class="mb-6">
                            <h2 class="text-xl font-bold text-gray-900 uppercase tracking-tight flex items-center gap-2 justify-center">
                                Глобальная таблица лидеров
                            </h2>
                            <h2 class="text-m  text-gray-500 uppercase tracking-tight flex items-center gap-4 justify-center">
                                Рейтинг лучших игроков по очкам взятых из pointercrate.com
                            </h2>
                        </div>

                        <!-- СЕТКА КАРТОЧЕК ИГРОКОВ -->
                        <div id="main-leaderboard-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                            <!-- Карточки вставляются динамически -->
                        </div>
                    </div>
                </main>

                <!-- ПРАВАЯ КОЛОНКА -->
                <aside class="w-full lg:w-52 flex-shrink-0 space-y-4 order-3">
                    <div class="bg-white border border-gray-200 shadow-sm">
                        <a href='streams.html'><h3 class="font-bold text-gray-800 uppercase p-4 border-b border-orange-200">СТРИМЫ И ПРОГРЕССЫ</h3></a>
                        <div id="streams-list" class="flex flex-col"></div>
                    </div>
                    <div class="bg-white border border-gray-200 shadow-sm">
                        <a href='news.html'><h3 class="font-bold text-gray-800 uppercase p-4 border-b border-orange-200">Новости</h3></a>
                        <div id="news-list" class="flex flex-col"></div>
                    </div>
                </aside>
            </div>
            
        </div>
        
        <!-- ПРАВАЯ КОЛОНКА (ЗАГЛУШКА БАННЕРА) -->
        <div class="hidden xl:block w-[200px] flex-shrink-0 animate-banner-right">
            <div class="mt-6 banner-container"> 
                <a href="https://www.youtube.com/@hertzogen" class="block" target="_blank">
                    <img src="images/right-banner.png" alt="Right Banner" class="max-w-full h-auto mx-auto" onerror="this.style.display='none'">
                </a>
            </div>
        </div>

    </div>

    <!-- АДАПТИВНЫЙ ФУТЕР -->
    <footer id="footer" class="bg-[#1a1a1a] text-white py-12 border-t-2 border-bold opacity-0 transition-opacity duration-500 mt-0">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex flex-wrap justify-center items-center gap-4">
                <a href='index.html'><img src="images/logo3.png" alt="Logo" class="h-12 sm:h-16 w-auto opacity-60 hover:opacity-100 transition-opacity"></a>
                <a href='https://www.youtube.com/@hertzogen'><img src="images/logo4.png" alt="Logo" class="h-16 w-auto opacity-60 hover:opacity-100 transition-opacity"></a>
                <a href='https://www.pointercrate.com'><img src="images/logo5.png" alt="Logo" class="h-16 w-auto opacity-60 hover:opacity-100 transition-opacity"></a>
            </div>
            <div class="flex flex-wrap justify-center gap-6">
                <a href="https://t.me/hertzogen2007" class="text-gray-400 hover:text-orange-500 transition-colors text-base sm:text-lg font-bold uppercase">Telegram</a>
                <a href="https://www.youtube.com/@hertzogen" class="text-gray-400 hover:text-orange-500 transition-colors text-base sm:text-lg font-bold uppercase">YouTube</a>
                <a href="https://www.pointercrate.com" class="text-gray-400 hover:text-orange-500 transition-colors text-base sm:text-lg font-bold uppercase">Pointercrate</a>
            </div>
            <div class="text-center md:text-right">
                <a href="#" class="text-gray-500 hover:text-white transition-colors text-sm underline">Privacy Policy</a>
            </div>
        </div>
        <p class="py-3 px-6 sm:px-12 text-gray-500 text-sm text-center md:text-left">© 2026 H&CR hertzogen</p>
    </footer>

    <script>
        const NEWS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=30512158&single=true&output=csv';
        const STREAMS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=781157227&single=true&output=csv';
        const LEADERBOARD_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=299902186&single=true&output=csv';
        const LEVELS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=164268489&single=true&output=csv';

        let allLevels = [];
        
        function toggleDropdown(element) { 
            const card = element.closest('.stream-card'); 
            if (card) { 
                const menu = card.querySelector('.dropdown-menu'); 
                if (menu) { menu.classList.toggle('show'); } 
            } 
        }

        async function initLevelsData() { 
            try { 
                const response = await fetch(LEVELS_URL); 
                const csvText = await response.text(); 
                const rows = csvText.split('\n').slice(1); 
                allLevels = rows.map((row, index) => { 
                    const cols = row.split(','); 
                    return { name: cols[2]?.trim(), position: index + 1 }; 
                }); 
                loadStreams(); 
            } catch (e) { console.error(e); } 
        }

        async function loadNews() { 
            const container = document.getElementById('news-list'); 
            try { 
                const response = await fetch(NEWS_URL); 
                const csvText = await response.text(); 
                const rows = csvText.split('\n').slice(1); 
                
                const allNewsData = rows.map((row, index) => {
                    if (!row.trim()) return null;
                    const [date, title, link] = row.split(','); 
                    return {
                        id: `news-${index}`, 
                        date: date ? date.trim() : '',
                        title: title ? title.trim() : ''
                    };
                }).filter(item => item !== null);

                const top10News = allNewsData.reverse().slice(0, 10);

                container.innerHTML = top10News.map(item => { 
                    return `
                        <a href="news.html#${item.id}" class="stream-card block mb-3 border border-gray-200 p-4 hover:border-gray-400 hover:bg-gray-50 transition-all">
                            <div class="text-[12px] font-bold text-orange-500 uppercase tracking-wider mb-1">${item.date}</div>
                            <div class="text-sm font-bold text-gray-900 leading-tight">${item.title}</div>
                        </a>`; 
                }).join(''); 
                
                container.classList.add('animate-list-fade');
            } catch (err) { console.error("Ошибка новостей в сайдбаре:", err); } 
        }

        async function loadStreams() { 
            const container = document.getElementById('streams-list'); 
            try { 
                const response = await fetch(STREAMS_URL); 
                const csvText = await response.text(); 
                const rows = csvText.split('\n').slice(1); 
                let streamData = rows.map(row => { 
                    if (!row.trim()) return null; 
                    const [status, levelName, streamer, country, percent, link] = row.split(','); 
                    const levelData = allLevels.find(l => l.name === levelName.trim()); 
                    return { status, levelName, streamer, country, percent, link, position: levelData ? levelData.position : '—' }; 
                }).filter(item => item !== null); 
                
                streamData.sort((a, b) => { 
                    const posA = a.position === '—' ? 9999 : a.position; 
                    const posB = b.position === '—' ? 9999 : b.position; 
                    return posA - posB; 
                }); 
                
                container.innerHTML = streamData.slice(0, 5).map(item => { 
                    const isLive = item.status.trim().toUpperCase() === 'LIVE'; 
                    const flagSrc = item.country ? `/images/flags/${item.country.trim().toLowerCase()}.gif` : '/images/flags/WORLD.gif'; 
                    return `<div class="stream-card mb-3 border border-gray-200 rounded-none bg-white"><div class="px-4 py-3 cursor-pointer select-none hover:bg-gray-50 transition-colors" onclick="toggleDropdown(this)"><div class="flex items-center mb-1.5"><span class="flex items-center text-[10px] font-bold uppercase ${isLive ? 'text-red-500' : 'text-gray-400'}"><span class="w-2 h-2 rounded-full mr-1.5 inline-block ${isLive ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>${item.status}</span></div><div class="flex justify-between items-center mb-1"><div class="flex items-center gap-2"><img src="${flagSrc}" class="w-6 h-4 border hltv-border object-cover flex-shrink-0" onerror="this.src='/images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900 truncate max-w-[140px]">${item.streamer}</span></div><span class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded">${item.position === '—' ? '—' : '#' + item.position}</span></div><div class="text-xs text-gray-600 font-medium truncate">${item.levelName} — <span class="font-bold text-gray-900">${item.percent}%</span></div></div><div class="dropdown-menu px-4 pb-3"><a href="${item.link}" target="_blank" class="block w-full bg-orange-600 text-white font-bold py-2 rounded text-[12px] uppercase text-center hover:bg-orange-700 transition-colors">СЛЕДИТЬ</a></div></div>`; 
                }).join(''); 
                
                container.classList.add('animate-list-fade');
                document.getElementById('footer').style.opacity = '1'; 
            } catch (err) { console.error("Ошибка стримов:", err); } 
        }

        async function loadLeaderboardData() { 
            const sidebarContainer = document.getElementById('leaderboard-list'); 
            const mainGridContainer = document.getElementById('main-leaderboard-grid'); 
            
            try { 
                const res = await fetch(LEADERBOARD_URL); 
                const csvText = await res.text();
                const rows = csvText.split('\n').slice(1); 
                
                // 1. Отрендерить боковой мини-список (Топ-5)
                sidebarContainer.innerHTML = rows.slice(0, 5).map(row => { 
                    if (!row.trim()) return ''; 
                    const [place, player, id, country] = row.split(','); 
                    const playerLink = id ? `player.html?id=${id.trim()}` : '#'; 
                    return `<a href="${playerLink}" class="block stream-card mb-1.5 border border-gray-200 p-2.5 hover:border-gray-500 hover:bg-gray-50 transition-all"><div class="flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-sm font-bold text-gray-500 w-5">#${place?.trim()}</span><img src="/images/flags/${country?.trim().toLowerCase()}.gif" class="w-5 h-3 hltv-border" onerror="this.src='/images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900">${player?.trim()}</span></div></div></a>`; 
                }).join('') + `<a href="leaderboard.html" class="block w-full text-center border border-gray-200 py-2 text-xs font-bold text-orange-600 hover:bg-orange-600 hover:text-white transition-all uppercase">Полный Список</a>`; 
                sidebarContainer.classList.add('animate-list-fade');

                // 2. Отрендерить центральную сетку карточек
                // 2. Отрендерить центральную сетку карточек
// Обрати внимание: мы используем 'index' в .map
mainGridContainer.innerHTML = rows.map((row, index) => {
    if (!row.trim()) return '';
    
    const cols = row.split(',');
    const place = cols[0]?.trim() || '';
    const player = cols[1]?.trim() || '';
    const id = cols[2]?.trim() || '';
    const country = cols[3]?.trim() || 'WORLD';
    const pts = cols[4]?.trim() || '0';
    const diff = cols[5]?.trim() || '0';
    const photo = cols[6]?.trim() || '';

    const playerLink = id ? `player.html?id=${id}` : '#';
    const flagSrc = `/images/flags/${country.toLowerCase()}.gif`;

    let diffValue = parseInt(diff) || 0;
    let diffHtml = '';
    if (diffValue > 0) {
        diffHtml = `<span class="text-green-400 font-bold ml-1 text-xs sm:text-sm">+${diffValue}</span>`;
    } else if (diffValue < 0) {
        diffHtml = `<span class="text-red-400 font-bold ml-1 text-xs sm:text-sm">-${Math.abs(diffValue)}</span>`;
    } else {
        diffHtml = `<span class="text-gray-400 font-bold ml-1 text-xs sm:text-sm">-</span>`;
    }

    // ДОБАВЛЯЕМ КЛАССЫ: opacity-0, animate-list-fade
    // ДОБАВЛЯЕМ СТИЛЬ: animation-delay
    return `
        <a href="${playerLink}" class="bg-white border border-gray-200 flex flex-col overflow-hidden card-hover relative group block opacity-0 animate-list-fade" style="animation-delay: ${index * 0.05}s">
            <!-- Блок с фото -->
            <div class="w-full aspect-[4/3] bg-gray-300 relative overflow-hidden">
                <div class="absolute top-0 left-0 bg-black/85 text-white font-bold text-sm sm:text-base px-2.5 py-1 z-10 flex items-center gap-1 rounded-br">
                    <span>#${place}</span>
                    ${diffHtml}
                </div>
                <div class="absolute top-0 right-0 bg-orange-600 text-white font-bold text-[11px] sm:text-xs px-2.5 py-1 z-10 rounded-bl tracking-wide">
                    ${pts} PTS
                </div>
                <img src="${photo}" alt="${player}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" onerror="this.src='/images/flags/WORLD.gif'; this.className='w-full h-full object-contain opacity-10 bg-gray-200';">
            </div>
            
            <div class="p-2.5 bg-white border-t border-gray-100 flex items-center min-w-0">
                <div class="flex items-center gap-1.5 min-w-0 w-full">
                    <img src="${flagSrc}" class="w-5 h-3.5 object-cover border hltv-border flex-shrink-0" onerror="this.src='/images/flags/WORLD.gif'">
                    <span class="text-xs sm:text-sm font-bold text-gray-900 truncate grow-text group-hover:text-orange-600 transition-colors">
                        ${player}
                    </span>
                </div>
            </div>
        </a>
    `;
}).join('');

// УДАЛИЛИ: mainGridContainer.classList.add('animate-list-fade'); 
// Теперь анимацию запускают сами карточки, так эффект будет красивее.
                
                mainGridContainer.classList.add('animate-list-fade');

            } catch (e) { console.error("Ошибка загрузки лидерборда:", e); } 
        }

        window.addEventListener('scroll', () => { 
            const miniLogo = document.getElementById('mini-logo-container'); 
            if (window.scrollY > 100) { 
                miniLogo.classList.remove('w-0', 'opacity-0'); 
                miniLogo.classList.add('w-16', 'sm:w-24', 'opacity-100'); 
            } else { 
                miniLogo.classList.add('w-0', 'opacity-0'); 
                miniLogo.classList.remove('w-16', 'sm:w-24', 'opacity-100'); 
            } 
        });

        initLevelsData(); 
        loadNews(); 
        loadLeaderboardData();
    </script>
</body>
</html>
