<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>H&CR | Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-hover { transition: transform 0.3s ease; }
        .card-hover:hover { transform: scale(1.03); }
        .dropdown-menu { display: none; }
        .dropdown-menu.show { display: block; }
    </style>
</head>
<body class="bg-black min-h-screen">
    <!-- Навигация -->
    <nav class="flex justify-center bg-white border-b border-gray-200 p-4">
        <a href="top" class="px-6 font-bold hover:text-orange-500">LEVELS</a>
        <a href="leaderboard" class="px-6 font-bold hover:text-orange-500">PLAYERS</a>
        <a href="news" class="px-6 font-bold hover:text-orange-500">NEWS</a>
        <a href="streams" class="px-6 font-bold hover:text-orange-500">STREAMS</a>
    </nav>

    <div class="max-w-6xl mx-auto p-6 bg-gray-100 min-h-screen">
        <h1 class="text-3xl font-bold text-center mb-8 uppercase">Глобальная таблица лидеров</h1>
        
        <div id="main-leaderboard-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-4">
            <!-- Карточки -->
        </div>

        <div id="load-more-container" class="text-center py-8 hidden">
            <button onclick="loadMorePlayers()" class="bg-gray-800 text-white py-3 px-8 rounded uppercase font-bold">Показать еще</button>
        </div>
    </div>

    <script>
        const DB = { players: [], records: [] };
        let currentLoaded = 0;
        
        async function init() {
            const resp = await fetch('./Players.csv?t=' + new Date().getTime());
            const text = await resp.text();
            // Простейший CSV парсер
            const lines = text.split('\n').filter(l => l.trim());
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            DB.players = lines.slice(1).map(line => {
                const values = line.split(',');
                let obj = {};
                headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : '');
                return obj;
            }).sort((a,b) => (parseInt(b.points)||0) - (parseInt(a.points)||0));

            render();
        }

        function render() {
            const grid = document.getElementById('main-leaderboard-grid');
            const btn = document.getElementById('load-more-container');
            const chunk = DB.players.slice(currentLoaded, currentLoaded + 50);

            chunk.forEach((p, i) => {
                const localRank = currentLoaded + i + 1;
                const globalBadge = p.global_rank && p.global_rank !== '0' && parseInt(p.global_rank) !== localRank 
                    ? `<span class="text-[10px] text-gray-400 ml-1">(Gl. #${p.global_rank})</span>` : '';

                const card = document.createElement('a');
                card.href = `player?id=${p.player_id}`;
                card.className = "bg-white p-4 border card-hover";
                card.innerHTML = `
                    <div class="font-bold text-xl">#${localRank}</div>
                    <div class="font-bold text-lg">${p.nickname} ${globalBadge}</div>
                    <div class="text-sm text-orange-600">${p.points} PTS</div>
                `;
                grid.appendChild(card);
            });

            currentLoaded += chunk.length;
            if (currentLoaded < DB.players.length) btn.classList.remove('hidden');
        }
        init();
    </script>
</body>
</html>
