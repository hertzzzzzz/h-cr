name: Update Demonlist Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python main.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Records.csv Players.csv Levels.csv Rankings.csv
          git commit -m "🤖 Автоматическое обновление базы данных" || exit 0
          git push
