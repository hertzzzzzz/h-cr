<!-- ВСЕ СКРИПТЫ ЛОГИКИ -->
<script>
    const LEVELS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=164268489&single=true&output=csv';
    const NEWS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=30512158&single=true&output=csv';
    const STREAMS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=781157227&single=true&output=csv';
    const LEADERBOARD_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=299902186&single=true&output=csv';
    
    let allLevels = [];

    (function injectAnimationStyles() {
        if (document.getElementById('runtime-animation-styles')) return;
        const style = document.createElement('style');
        style.id = 'runtime-animation-styles';
        style.innerHTML = `
            @keyframes listContentFadeIn {
                from { opacity: 0; translate: 0 10px; }
                to { opacity: 1; translate: 0 0; }
            }
            .animate-list-fade {
                animation: listContentFadeIn 0.4s ease-out forwards;
            }
            #news-list, #streams-list, #leaderboard-list, #main-streams-list {
                opacity: 0;
            }
        `;
        document.head.appendChild(style);
    })();

    function toggleDropdown(element) {
        const card = element.closest('.stream-card');
        if (card) {
            const menu = card.querySelector('.dropdown-menu');
            if (menu) {
                if (menu.classList.contains('hidden') || menu.style.display === 'none') {
                    menu.classList.remove('hidden');
                    menu.style.display = 'block';
                } else {
                    menu.classList.add('hidden');
                    menu.style.display = 'none';
                }
            }
        }
    }

    async function initLevelsData() {
        try {
            const response = await fetch(LEVELS_URL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);
            
            allLevels = rows.map((row, index) => {
                const cols = row.split(',');
                return { name: cols[2]?.trim(), position: index + 1 };
            });

            await loadStreams();
            await loadMainStreams(); 
        } catch (e) { 
            console.error(e); 
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function loadMainStreams() {
        const container = document.getElementById('main-streams-list');
        try {
            const response = await fetch(STREAMS_URL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);

            let streamData = rows.map(row => {
                if (!row.trim()) return null;
                const cols = row.split(',');
                if (cols.length < 2) return null;

                const status = cols[0]?.trim() || '';
                const levelName = cols[1]?.trim() || '';
                const streamer = cols[2]?.trim() || '';
                const country = cols[3]?.trim() || '';
                const percent = cols[4]?.trim() || '';
                const link = cols[5]?.trim() || '';

                const levelData = allLevels.find(l => l.name === levelName);
                return { status, levelName, streamer, country, percent, link, position: levelData ? levelData.position : '—' };
            }).filter(item => item !== null);

            streamData.sort((a, b) => {
                const posA = a.position === '—' ? 9999 : a.position;
                const posB = b.position === '—' ? 9999 : b.position;
                return posA - posB;
            });

            container.innerHTML = streamData.map(item => {
                const isLive = item.status.toUpperCase() === 'LIVE';
                const flagSrc = item.country ? `/images/flags/${item.country.toLowerCase()}.gif` : '/images/flags/WORLD.gif';
                
                return `
                    <div class="card-hover bg-white border border-gray-200 p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-sm">
                        <div class="flex items-center gap-4 flex-1 min-w-0">
                            <div class="flex-shrink-0 flex flex-col items-center min-w-[50px]">
                                <span class="flex items-center text-[10px] font-bold uppercase ${isLive ? 'text-red-500' : 'text-gray-400'} mb-1.5">
                                    <span class="w-2 h-2 rounded-full mr-1 inline-block ${isLive ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>
                                    ${item.status}
                                </span>
                                <span class="text-xs font-bold text-orange-600 bg-orange-100 px-2.5 py-0.5 rounded">
                                    ${item.position === '—' ? '—' : '#' + item.position}
                                </span>
                            </div>
                            <div class="min-w-0 flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <img src="${flagSrc}" class="w-6 h-4 border hltv-border object-cover flex-shrink-0" onerror="this.src='/images/flags/WORLD.gif'">
                                    <span class="text-base font-bold text-gray-900 truncate">${item.streamer}</span>
                                </div>
                                <div class="text-xs sm:text-sm text-gray-600 font-medium truncate">
                                    ${item.levelName} — <span class="font-bold text-gray-950">${item.percent}%</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex-shrink-0 w-full sm:w-auto">
                            <a href="${item.link}" target="_blank" class="block w-full sm:w-36 text-center bg-orange-600 hover:bg-orange-700 text-white text-xs font-bold py-3 px-4 uppercase tracking-wider transition-colors">
                                 СЛЕДИТЬ
                            </a>
                        </div>
                    </div>`;
            }).join('');

            container.classList.add('animate-list-fade');
        } catch (err) { 
            console.error("Ошибка загрузки центральных стримов:", err); 
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function loadStreams() {
        const container = document.getElementById('streams-list');
        try {
            const response = await fetch(STREAMS_URL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);

            let streamData = rows.map(row => {
                if (!row.trim()) return null;
                const cols = row.split(',');
                if (cols.length < 2) return null;

                const status = cols[0]?.trim() || '';
                const levelName = cols[1]?.trim() || '';
                const streamer = cols[2]?.trim() || '';
                const country = cols[3]?.trim() || '';
                const percent = cols[4]?.trim() || '';
                const link = cols[5]?.trim() || '';

                const levelData = allLevels.find(l => l.name === levelName);
                return { status, levelName, streamer, country, percent, link, position: levelData ? levelData.position : '—' };
            }).filter(item => item !== null);

            streamData.sort((a, b) => {
                const posA = a.position === '—' ? 9999 : a.position;
                const posB = b.position === '—' ? 9999 : b.position;
                return posA - posB;
            });

            container.innerHTML = streamData.slice(0, 5).map(item => {
                const isLive = item.status.toUpperCase() === 'LIVE';
                const flagSrc = item.country ? `/images/flags/${item.country.toLowerCase()}.gif` : '/images/flags/WORLD.gif';
                
                return `
                    <div class="stream-card mb-3 border border-gray-200 rounded-none overflow-hidden bg-white">
                        <div class="px-4 py-3 cursor-pointer select-none hover:bg-gray-50 transition-colors" onclick="toggleDropdown(this)">
                            <div class="flex items-center mb-1.5">
                                <span class="flex items-center text-[10px] font-bold uppercase ${isLive ? 'text-red-500' : 'text-gray-400'}">
                                    <span class="w-2 h-2 rounded-full mr-1.5 inline-block ${isLive ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>
                                    ${item.status}
                                </span>
                            </div>
                            <div class="flex justify-between items-center mb-1">
                                <div class="flex items-center gap-2">
                                    <img src="${flagSrc}" class="w-6 h-4 border hltv-border object-cover flex-shrink-0" onerror="this.src='/images/flags/WORLD.gif'">
                                    <span class="text-sm font-bold text-gray-900 truncate max-w-[140px]">${item.streamer}</span>
                                </div>
                                <span class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded">
                                    ${item.position === '—' ? '—' : '#' + item.position}
                                </span>
                            </div>
                            <div class="text-xs text-gray-600 font-medium truncate">
                                ${item.levelName} — <span class="font-bold text-gray-900">${item.percent}%</span>
                            </div>
                        </div>
                        
                        <div class="dropdown-menu px-4 pb-3" style="display: none !important; background: transparent !important; border: none !important; height: auto !important; min-height: 45px !important;">
                            <a href="${item.link}" target="_blank" style="display: block !important; width: 100% !important; text-align: center !important; background-color: #ea580c !important; color: #ffffff !important; font-size: 12px !important; font-weight: 700 !important; padding-top: 8px !important; padding-bottom: 8px !important; text-transform: uppercase !important; text-decoration: none !important; transition: background-color 0.2s ease;" onmouseover="this.style.setProperty('background-color', '#c2410c', 'important')" onmouseout="this.style.setProperty('background-color', '#ea580c', 'important')">
                                 СЛЕДИТЬ
                            </a>
                        </div>
                    </div>`;
            }).join('');

            container.classList.add('animate-list-fade');
            await loadNews();
        } catch (err) { 
            console.error("Ошибка боковых стримов:", err); 
        }
    }

    async function loadNews() { 
        const container = document.getElementById('news-list'); 
        try { 
            const response = await fetch(NEWS_URL); 
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1); 
            
            const allNewsData = rows.map((row, index) => {
                if (!row.trim()) return null;
                const cols = row.split(','); 
                return { id: `news-${index}`, date: cols[0]?.trim() || '', title: cols[1]?.trim() || '' };
            }).filter(item => item !== null);

            container.innerHTML = allNewsData.reverse().slice(0, 10).map(item => { 
                return `
                    <a href="news.html#${item.id}" class="stream-card block mb-3 border border-gray-200 p-4 hover:border-gray-400 hover:bg-gray-50 transition-all">
                        <div class="text-[12px] font-bold text-orange-500 uppercase tracking-wider mb-1">${item.date}</div>
                        <div class="text-sm font-bold text-gray-900 leading-tight">${item.title}</div>
                    </a>`; 
            }).join(''); 
            
            container.classList.add('animate-list-fade');
        } catch (err) { console.error(err); } 
    }

    async function loadLeaderboard() {
        const container = document.getElementById('leaderboard-list');
        try {
            const res = await fetch(LEADERBOARD_URL);
            const rows = (await res.text()).split('\n').slice(1);
            
            container.innerHTML = rows.slice(0, 5).map(row => {
                if (!row.trim()) return '';
                const cols = row.split(',');
                const place = cols[0]?.trim() || '';
                const player = cols[1]?.trim() || '';
                const id = cols[2]?.trim() || '';
                const country = cols[3]?.trim() || '';
                return `
                    <a href="player.html?id=${id}" class="block stream-card mb-1.5 border border-gray-200 p-2.5 hover:border-gray-500 hover:bg-gray-50 transition-all">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-gray-500 w-5">#${place}</span>
                                <img src="/images/flags/${country.toLowerCase()}.gif" class="w-5 h-3 hltv-border" onerror="this.src='/images/flags/WORLD.gif'">
                                <span class="text-sm font-bold text-gray-900">${player}</span>
                            </div>
                        </div>
                    </a>`;
            }).join('') + `
                <a href="leaderboard.html" class="block w-full text-center border border-gray-200 py-2 text-xs font-bold text-orange-600 hover:bg-orange-600 hover:text-white transition-all uppercase">
                    Полный Список
                </a>`;

            container.classList.add('animate-list-fade');
        } catch (e) { console.error(e); }
    }

    document.getElementById('scroll-to-top-btn').addEventListener('click', (e) => {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    window.addEventListener('scroll', () => {
        const miniLogo = document.getElementById('mini-logo-container');
        if (window.scrollY > 100) {
            miniLogo.classList.remove('w-0', 'opacity-0');
            miniLogo.classList.add('w-16', 'sm:w-24', 'opacity-100');
        } else {
            miniLogo.classList.add('w-0', 'opacity-0');
            miniLogo.classList.remove('w-16', 'sm:w-24', 'opacity-100');
        }
    });

    initLevelsData();
    loadLeaderboard();
</script>
</body>
</html>
