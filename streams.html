<!-- ВСЕ СКРИПТЫ ЛОГИКИ -->
<script>
    const URLS = { 
        players: './Players.csv', 
        levels: './Levels.csv', 
        rankings: './Rankings.csv', 
        streams: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=1466784286&single=true&output=csv', 
        news: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=30512158&single=true&output=csv' 
    };
    const DB = { players: {}, levels: {}, rankings: {}, streams: [], news: [], playersArr: [] };

    (function injectAnimationStyles() {
        if (document.getElementById('runtime-animation-styles')) return;
        const style = document.createElement('style'); style.id = 'runtime-animation-styles';
        style.innerHTML = `@keyframes listContentFadeIn { from { opacity: 0; translate: 0 10px; } to { opacity: 1; translate: 0 0; } } .animate-list-fade { animation: listContentFadeIn 0.4s ease-out forwards; } #news-list, #streams-list, #leaderboard-list, #main-streams-list { opacity: 0; }`;
        document.head.appendChild(style);
    })();

    // 1. Улучшенный парсер (теперь сохраняет сырую строку для надежности)
    function parseCSV(str) {
        const result = [];
        const lines = str.split(/\r?\n/).filter(l => l.trim());
        if (!lines.length) return result;
        
        let delim = ',';
        if (lines[0].indexOf(',') === -1 && lines[0].indexOf(';') !== -1) delim = ';';
        const headers = lines[0].split(delim).map(h => h.replace(/["\r\n\s\ufeff]/g, '').toLowerCase());
        
        for (let i = 1; i < lines.length; i++) {
            const row = lines[i];
            const cols = [];
            let curr = '';
            let inQuotes = false;
            for (let j = 0; j < row.length; j++) {
                const char = row[j];
                if (char === '"') { inQuotes = !inQuotes; }
                else if (char === delim && !inQuotes) { cols.push(curr); curr = ''; }
                else { curr += char; }
            }
            cols.push(curr);
            
            // Запоминаем сырую строку, чтобы потом выдрать из нее ссылку напрямую
            let obj = { _rawStr: row };
            headers.forEach((h, idx) => {
                let val = cols[idx] ? cols[idx].trim() : '';
                if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
                obj[h] = val;
            });
            result.push(obj);
        }
        return result;
    }

    // 2. Бронебойная сборка стримов (вытаскивает URL при любых условиях)
    // 2. Бронебойная сборка стримов (вытаскивает URL при любых условиях)
   function getParsedStreams() {
        return DB.streams.map(stream => {
            // Берем ID напрямую по ключу
            const pId = String(stream.player_id || '').trim();
            const lId = String(stream.level_id || '').trim();
            
            // Если ID пустые, значит парсер ошибся с заголовками, ищем их в сырой строке
            let finalPId = pId;
            let finalLId = lId;
            if (!finalPId || !finalLId) {
                const parts = String(stream._rawStr || '').split(',');
                finalPId = parts[2] ? parts[2].trim() : '';
                finalLId = parts[3] ? parts[3].trim() : '';
            }

            if (!finalPId || !finalLId) return null;

            // Ищем игрока в базе (теперь точно найдет)
            const player = DB.players[finalPId] || { nickname: 'Unknown', country: 'WORLD' };
            const level = DB.levels[finalLId] || { name: 'Unknown Level' };
            
            // Ссылка: берем из поля link, если нет - ищем в _rawStr
            let link = stream.link ? stream.link.trim() : '';
            if (!link || link === "") {
                const urlMatch = String(stream._rawStr).match(/https?:\/\/[^\s,]+/);
                link = urlMatch ? urlMatch[0] : 'https://youtube.com';
            }

            return { 
                status: stream.is_live || 'LIVE', 
                progress: stream.progress || '0', 
                link: link, 
                player, 
                level, 
                rank: DB.rankings[finalLId] || 9999 
            };
        }).filter(s => s !== null);
    }

    async function initApp() {
        try {
            // Защита от кэша браузера
            const responses = await Promise.all(Object.values(URLS).map(url => {
                const sep = url.includes('?') ? '&' : '?';
                return fetch(url + sep + 't=' + new Date().getTime());
            }));
            const texts = await Promise.all(responses.map(res => res.text()));
            
            const pArr = parseCSV(texts[0]); 
            const lArr = parseCSV(texts[1]); 
            const rArr = parseCSV(texts[2]); 
            DB.streams = parseCSV(texts[3]); 
            DB.news = parseCSV(texts[4]);
            
            pArr.forEach(p => DB.players[String(p.player_id).trim()] = p); DB.playersArr = pArr;
            lArr.forEach(l => DB.levels[String(l.level_id).trim()] = l);
            rArr.forEach(r => { const lId = String(r.level_id).trim(); const pos = parseInt(r.position) || 9999; if (!DB.rankings[lId] || pos < DB.rankings[lId]) DB.rankings[lId] = pos; });
            
            renderSidebars(); 
            renderMainStreams();
            renderTopLevels(lArr);
        } catch (err) { 
            console.error("Ошибка:", err); 
            const loader = document.getElementById('loader');
            if(loader) loader.style.display = 'none'; 
        }
    }

    function renderMainStreams() {
        const container = document.getElementById('main-streams-list');
        if (!container) return;

        const streams = getParsedStreams().sort((a, b) => a.rank - b.rank);

        container.innerHTML = streams.map(s => {
            const isLive = String(s.status).toUpperCase() === 'LIVE';
            const flagSrc = `images/flags/${(s.player.country||'WORLD').toLowerCase()}.gif`;
            
            return `
                <div class="card-hover bg-white border border-gray-200 p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-sm">
                    <div class="flex items-center gap-4 flex-1 min-w-0">
                        <div class="flex-shrink-0 flex flex-col items-center min-w-[50px]">
                            <span class="flex items-center text-[10px] font-bold uppercase ${isLive ? 'text-red-500' : 'text-gray-400'} mb-1.5">
                                <span class="w-2 h-2 rounded-full mr-1 inline-block ${isLive ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>
                                ${s.status}
                            </span>
                            <span class="text-xs font-bold text-orange-600 bg-orange-100 px-2.5 py-0.5 rounded">
                                #${s.rank === 9999 ? '—' : s.rank}
                            </span>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <img src="${flagSrc}" class="w-6 h-4 border hltv-border object-cover flex-shrink-0" onerror="this.src='images/flags/WORLD.gif'">
                                <span class="text-base font-bold text-gray-900 truncate">${s.player.nickname}</span>
                            </div>
                            <div class="text-xs sm:text-sm text-gray-600 font-medium truncate">
                                ${s.level.name} — <span class="font-bold text-gray-950">${s.progress}%</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex-shrink-0 w-full sm:w-auto">
                        <a href="${s.link}" target="_blank" class="block w-full sm:w-36 text-center bg-orange-600 hover:bg-orange-700 text-white text-xs font-bold py-3 px-4 uppercase tracking-wider transition-colors">
                             СЛЕДИТЬ
                        </a>
                    </div>
                </div>`;
        }).join('');
        container.classList.add('animate-list-fade');
        
        const loader = document.getElementById('loader');
        if(loader) loader.style.display = 'none';
    }

    function renderSidebars() {
        const leadList = DB.playersArr.filter(p => p.is_banned !== 'TRUE' && p.is_banned !== 'true').sort((a,b) => (parseInt(b.points)||0) - (parseInt(a.points)||0)).slice(0, 5);
        const lContainer = document.getElementById('leaderboard-list');
        if (lContainer) lContainer.innerHTML = leadList.map((p, i) => `<a href="player?id=${p.player_id}" class="block stream-card mb-1.5 border border-gray-200 p-2.5 hover:border-gray-500 hover:bg-gray-50 transition-all"><div class="flex items-center gap-2"><span class="text-sm font-bold text-gray-500 w-5">#${i+1}</span><img src="images/flags/${(p.country||'WORLD').toLowerCase()}.gif" class="w-5 h-3 hltv-border" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900">${p.nickname}</span></div></a>`).join('') + `<a href="leaderboard" class="block w-full text-center border border-gray-200 py-2 text-xs font-bold text-orange-600 hover:bg-orange-600 hover:text-white transition-all uppercase">Полный Список</a>`, lContainer.classList.add('animate-list-fade');

        const streamsContainer = document.getElementById('streams-list');
        if (streamsContainer) {
            const streams = getParsedStreams().sort((a, b) => a.rank - b.rank).slice(0, 5);
            streamsContainer.innerHTML = streams.map(s => { 
                const isLive = String(s.status).trim().toUpperCase() === 'LIVE'; 
                return `<div class="stream-card mb-3 border border-gray-200 bg-white"><div class="px-4 py-3 cursor-pointer hover:bg-gray-50 transition-colors" onclick="toggleDropdown(this)"><div class="flex items-center mb-1.5"><span class="flex items-center text-[10px] font-bold uppercase ${isLive ? 'text-red-500' : 'text-gray-400'}"><span class="w-2 h-2 rounded-full mr-1.5 inline-block ${isLive ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>${isLive ? 'LIVE' : 'OFFLINE'}</span></div><div class="flex justify-between items-center mb-1"><div class="flex items-center gap-2"><img src="images/flags/${(s.player.country||'WORLD').toLowerCase()}.gif" class="w-6 h-4 border hltv-border object-cover" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900 truncate max-w-[140px]">${s.player.nickname}</span></div><span class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded">#${s.rank === 9999 ? '—' : s.rank}</span></div><div class="text-xs text-gray-600 font-medium truncate">${s.level.name} — <span class="font-bold text-gray-900">${s.progress}%</span></div></div><div class="dropdown-menu px-4 pb-3" style="display: none;"><a href="${s.link}" target="_blank" class="block w-full bg-orange-600 text-white font-bold py-2 rounded text-[12px] uppercase text-center hover:bg-orange-700">СЛЕДИТЬ</a></div></div>`; 
            }).join(''); 
            streamsContainer.classList.add('animate-list-fade');
        }

        const newsContainer = document.getElementById('news-list');
        if (newsContainer) newsContainer.innerHTML = DB.news.slice(-5).reverse().map((n, i) => `<a href="news.html#news-${DB.news.length - 1 - i}" class="stream-card block mb-3 border border-gray-200 p-4 hover:border-gray-400 hover:bg-gray-50 transition-all"><div class="text-[12px] font-bold text-orange-500 uppercase tracking-wider mb-1">${n['хедлайнер'] || n['date'] || ''}</div><div class="text-sm font-bold text-gray-900 leading-tight">${n['заголовок'] || n['title'] || ''}</div></a>`).join(''), newsContainer.classList.add('animate-list-fade');
        if(document.getElementById('footer')) document.getElementById('footer').style.opacity = '1';
    }

    function toggleDropdown(el) { const menu = el.closest('.stream-card').querySelector('.dropdown-menu'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; }
    document.getElementById('scroll-to-top-btn')?.addEventListener('click', (e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    window.addEventListener('scroll', () => { const miniLogo = document.getElementById('mini-logo-container'); if (miniLogo) { if (window.scrollY > 100) { miniLogo.classList.remove('w-0', 'opacity-0'); miniLogo.classList.add('w-16', 'sm:w-24', 'opacity-100'); } else { miniLogo.classList.add('w-0', 'opacity-0'); miniLogo.classList.remove('w-16', 'sm:w-24', 'opacity-100'); } } });

    initApp();
</script>
</body>
</html>
