        * { font-family: 'Montserrat', sans-serif !important; }
        html, body { background-color: #000 !important; margin: 0; padding: 0; }
        
        .dropdown-menu { display: none; transition: all 0.3s ease; }
        .dropdown-menu.show { display: block; }
        
        .hltv-border { border: 1px solid #000; box-sizing: border-box; }
        
        @keyframes listContentFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }

        @keyframes bannerFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }

            opacity: 0;
        }

        .animate-list-fade {
            animation: listContentFadeIn 0.5s ease-out forwards;
        }

        .animate-banner-left {
            opacity: 0;
            animation: bannerFadeIn 0.6s ease-in-out forwards;
            animation-delay: 150ms;
        }
        .animate-banner-right {
            opacity: 0;
            animation: bannerFadeIn 0.6s ease-in-out forwards;
            animation-delay: 300ms;
        }
    </style>

    <script>
        const NEWS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=30512158&single=true&output=csv';
        const STREAMS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=781157227&single=true&output=csv';
        const LEADERBOARD_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=299902186&single=true&output=csv';
        const LEVELS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCNytbZ_R5TV-BfA1M2m0HiEe_C5FwfMlOCWWIu7gK9iOB48uKOnohrv6xTMqVmmjtB3d5XrISE4p9/pub?gid=164268489&single=true&output=csv';

        let allLevels = [];

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }
        
        function toggleDropdown(element) { 
            const card = element.closest('.stream-card'); 
            if (card) { 
                const menu = card.querySelector('.dropdown-menu'); 
                if (menu) { menu.classList.toggle('show'); } 
            } 
        }

        async function initLevelsData() { 
            try { 
                const response = await fetch(LEVELS_URL); 
                const csvText = await response.text(); 
                const rows = csvText.split('\n').slice(1); 
                allLevels = rows.map((row, index) => { 
                    const cols = row.split(','); 
                    return { name: cols[2]?.trim(), position: index + 1 }; 
                }); 
                loadStreams(); 
            } catch (e) { console.error(e); } 
        }

        async function loadNews() { 
            const container = document.getElementById('news-list'); 
            try { 
                const response = await fetch(NEWS_URL); 
                const csvText = await response.text(); 
                const rows = csvText.split('\n').slice(1); 
                const allNewsData = rows.map((row, index) => {
                    if (!row.trim()) return null;
                    const [date, title] = row.split(','); 
                    return { id: `news-${index}`, date: date?.trim(), title: title?.trim() };
                }).filter(item => item !== null);
                container.innerHTML = allNewsData.reverse().slice(0, 10).map(item => `
                    <a href="news.html#${item.id}" class="stream-card block mb-3 border border-gray-200 p-4 hover:border-gray-400 hover:bg-gray-50 transition-all">
                        <div class="text-[12px] font-bold text-orange-500 uppercase tracking-wider mb-1">${item.date}</div>
                        <div class="text-sm font-bold text-gray-900 leading-tight">${item.title}</div>
                    </a>`).join(''); 
                container.classList.add('animate-list-fade');
            } catch (err) { console.error(err); } 
        }

        async function loadStreams() { 
            const container = document.getElementById('streams-list'); 
            try { 
                const response = await fetch(STREAMS_URL); 
                const csvText = await response.text(); 
                const rows = csvText.split('\n').slice(1); 
                let streamData = rows.map(row => { 
                    if (!row.trim()) return null; 
                    const [status, levelName, streamer, country, percent, link] = row.split(','); 
                    const levelData = allLevels.find(l => l.name === levelName.trim()); 
                    return { status, levelName, streamer, country, percent, link, position: levelData ? levelData.position : '—' }; 
                }).filter(item => item !== null); 
                
                streamData.sort((a, b) => (a.position === '—' ? 9999 : a.position) - (b.position === '—' ? 9999 : b.position)); 
                
                container.innerHTML = streamData.slice(0, 5).map(item => { 
                    const isLive = item.status.trim().toUpperCase() === 'LIVE'; 
                    const flagSrc = item.country ? `images/flags/${item.country.trim().toLowerCase()}.gif` : 'images/flags/WORLD.gif'; 
                    return `<div class="stream-card mb-3 border border-gray-200 bg-white"><div class="px-4 py-3 cursor-pointer select-none hover:bg-gray-50 transition-colors" onclick="toggleDropdown(this)"><div class="flex items-center mb-1.5"><span class="flex items-center text-[10px] font-bold uppercase ${isLive ? 'text-red-500' : 'text-gray-400'}"><span class="w-2 h-2 rounded-full mr-1.5 inline-block ${isLive ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}"></span>${item.status}</span></div><div class="flex justify-between items-center mb-1"><div class="flex items-center gap-2"><img src="${flagSrc}" class="w-6 h-4 border hltv-border object-cover" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900 truncate max-w-[140px]">${item.streamer}</span></div><span class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded">${item.position === '—' ? '—' : '#' + item.position}</span></div><div class="text-xs text-gray-600 font-medium truncate">${item.levelName} — <span class="font-bold text-gray-900">${item.percent}%</span></div></div><div class="dropdown-menu px-4 pb-3"><a href="${item.link}" target="_blank" class="block w-full bg-orange-600 text-white font-bold py-2 rounded text-[12px] uppercase text-center hover:bg-orange-700 transition-colors">СЛЕДИТЬ</a></div></div>`; 
                }).join(''); 
                container.classList.add('animate-list-fade');
                document.getElementById('footer').style.opacity = '1'; 
            } catch (err) { console.error(err); } 
        }

        async function loadPlayerData() {
            const sidebarContainer = document.getElementById('leaderboard-list');
            const profileWrapper = document.getElementById('player-profile-wrapper');
            const levelsGrid = document.getElementById('player-levels-grid');
            
            const urlParams = new URLSearchParams(window.location.search);
            const playerId = urlParams.get('id')?.trim();

            try {
                const res = await fetch(LEADERBOARD_URL);
                const csvText = await res.text();
                const rows = csvText.split('\n').slice(1);

                sidebarContainer.innerHTML = rows.slice(0, 5).map(row => {
                    if (!row.trim()) return '';
                    const cols = parseCSVLine(row);
                    const playerLink = cols[2] ? `player.html?id=${cols[2]}` : '#';
                    return `<a href="${playerLink}" class="block stream-card mb-1.5 border border-gray-200 p-2.5 hover:border-gray-500 hover:bg-gray-50 transition-all"><div class="flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-sm font-bold text-gray-500 w-5">#${cols[0]}</span><img src="images/flags/${cols[3]?.toLowerCase()}.gif" class="w-5 h-3 hltv-border" onerror="this.src='images/flags/WORLD.gif'"><span class="text-sm font-bold text-gray-900">${cols[1]}</span></div></div></a>`;
                }).join('') + `<a href="leaderboard.html" class="block w-full text-center border border-gray-200 py-2 text-xs font-bold text-orange-600 hover:bg-orange-600 hover:text-white transition-all uppercase">Полный Список</a>`;
                sidebarContainer.classList.add('animate-list-fade');

                let playerRow = rows.find(row => {
                    if (!row.trim()) return false;
                    const cols = parseCSVLine(row);
                    return cols[2] === playerId;
                });

                if (!playerRow) {
                    document.getElementById('player-name').innerText = "Игрок не найден";
                    profileWrapper.classList.add('animate-list-fade');
                    return;
                }

                const cols = parseCSVLine(playerRow);
                const place = cols[0] || '—';
                const nickname = cols[1] || '';
                const country = cols[3] || 'WORLD';
                const pts = cols[4] || '0';
                const photo = cols[6] || '';
                const infoText = cols[7] || '';
                const levelsListRaw = cols[8] || '';
                const ytLink = cols[9] || '';
                const twitchLink = cols[10] || '';
                const realName = cols[11] || '';

                let finalDisplayName = nickname;
                if (realName) {
                    const nameParts = realName.split(' ');
                    if (nameParts.length >= 2) {
                        finalDisplayName = `${nameParts[0]} "${nickname}" ${nameParts.slice(1).join(' ')}`;
                    } else {
                        finalDisplayName = `${realName} "${nickname}"`;
                    }
                }

                document.getElementById('player-name').innerText = finalDisplayName;
                document.getElementById('player-photo').src = photo;
                document.getElementById('player-flag').src = `images/flags/${country.toLowerCase()}.gif`;
                document.getElementById('player-place').innerText = `#${place}`;
                document.getElementById('player-info').innerText = infoText;

                if (ytLink) {
                    const btn = document.getElementById('link-yt');
                    btn.href = ytLink;
                    btn.classList.remove('hidden');
                    btn.classList.add('flex');
                }
                if (twitchLink) {
                    const btn = document.getElementById('link-twitch');
                    btn.href = twitchLink;
                    btn.classList.remove('hidden');
                    btn.classList.add('flex');
                }

                if (levelsListRaw) {
                    const cleanList = levelsListRaw.replace(/^"|"$/g, '');
                    const levelsArray = cleanList.split(',').map(l => l.trim()).filter(l => l.length > 0);

                    levelsGrid.innerHTML = levelsArray.map(level => `
                        <div class="bg-gray-50 border border-gray-200 p-3 flex items-center justify-between select-none">
                            <span class="font-bold text-gray-800 text-sm uppercase">${level}</span>
                            <span class="text-[10px] bg-green-100 text-green-700 font-bold px-2 py-0.5 rounded uppercase tracking-wider">Пройдено</span>
                        </div>
                    `).join('');
                } else {
                    levelsGrid.innerHTML = `<div class="text-gray-400 text-sm italic text-center col-span-2 py-4">Нет пройденных уровней</div>`;
                }

                profileWrapper.classList.add('animate-list-fade');

            } catch (err) {
                console.error("Ошибка при сборке профиля:", err);
            }
        }

        window.addEventListener('scroll', () => { 
            const miniLogo = document.getElementById('mini-logo-container'); 
            if (window.scrollY > 100) { 
                miniLogo.classList.remove('w-0', 'opacity-0'); 
                miniLogo.classList.add('w-16', 'sm:w-24', 'opacity-100'); 
            } else { 
                miniLogo.classList.add('w-0', 'opacity-0'); 
                miniLogo.classList.remove('w-16', 'sm:w-24', 'opacity-100'); 
            } 
        });

        initLevelsData(); 
        loadNews(); 
        loadPlayerData();
    </script>
</body>
</html>
